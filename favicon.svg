<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Three connected nodes — system architecture symbol -->
  <line x1="22" y1="20" x2="42" y2="20" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="42" y1="20" x2="32" y2="40" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="22" y1="20" x2="32" y2="40" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Nodes -->
  <circle cx="22" cy="20" r="5" fill="#fff"/>
  <circle cx="42" cy="20" r="5" fill="#fff"/>
  <circle cx="32" cy="40" r="5" fill="#fff"/>
  <!-- Inner dots (accent color) -->
  <circle cx="22" cy="20" r="2.5" fill="#818cf8"/>
  <circle cx="42" cy="20" r="2.5" fill="#818cf8"/>
  <circle cx="32" cy="40" r="2.5" fill="#818cf8"/>
</svg>
