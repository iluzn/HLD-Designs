<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} — SystemCraft</title>
    <meta name="description" content="{{ page.description }}">
    <link rel="canonical" href="https://systemcraft.in{{ page.url }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0a0f;
            color: #e2e8f0;
            line-height: 1.7;
        }
        header {
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            background: rgba(10,10,15,0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        .header-inner {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 1.2rem; font-weight: 700; color: #fff; text-decoration: none; }
        .logo span { color: #6366f1; }
        nav a { color: #94a3b8; text-decoration: none; margin-left: 1.5rem; font-size: 0.9rem; }
        nav a:hover { color: #fff; }

        .content {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 1.5rem 4rem;
        }

        /* Typography */
        .content h1 { font-size: 2.2rem; font-weight: 700; color: #fff; margin-bottom: 1.5rem; letter-spacing: -0.02em; }
        .content h2 { font-size: 1.5rem; font-weight: 600; color: #fff; margin-top: 2.5rem; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .content h3 { font-size: 1.15rem; font-weight: 600; color: #e2e8f0; margin-top: 2rem; margin-bottom: 0.8rem; }
        .content h4 { font-size: 1rem; font-weight: 600; color: #cbd5e1; margin-top: 1.5rem; margin-bottom: 0.5rem; }
        .content p { margin-bottom: 1rem; color: #cbd5e1; }
        .content a { color: #6366f1; text-decoration: none; }
        .content a:hover { text-decoration: underline; }

        /* Lists */
        .content ul, .content ol { margin-bottom: 1rem; padding-left: 1.5rem; color: #cbd5e1; }
        .content li { margin-bottom: 0.4rem; }
        .content li strong { color: #e2e8f0; }

        /* Code */
        .content code {
            font-family: 'JetBrains Mono', monospace;
            background: #1e1e2e;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85em;
            color: #a5b4fc;
        }
        .content pre {
            background: #1e1e2e;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px;
            padding: 1.2rem;
            overflow-x: auto;
            margin-bottom: 1.5rem;
        }
        .content pre code {
            background: none;
            padding: 0;
            font-size: 0.85rem;
            color: #e2e8f0;
        }

        /* Tables */
        .content table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .content th {
            background: #1e1e2e;
            color: #e2e8f0;
            padding: 0.7rem 1rem;
            text-align: left;
            font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .content td {
            padding: 0.6rem 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            color: #cbd5e1;
        }
        .content tr:hover td { background: rgba(99,102,241,0.03); }

        /* Blockquotes */
        .content blockquote {
            border-left: 3px solid #6366f1;
            padding: 0.5rem 1rem;
            margin-bottom: 1rem;
            background: rgba(99,102,241,0.05);
            border-radius: 0 6px 6px 0;
        }
        .content blockquote p { color: #a5b4fc; margin-bottom: 0; }

        /* Mermaid */
        .mermaid {
            background: #12121a;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        /* HR */
        .content hr { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 2rem 0; }

        /* Back link */
        .back { display: inline-block; margin-bottom: 2rem; color: #6366f1; text-decoration: none; font-size: 0.9rem; }
        .back:hover { text-decoration: underline; }

        footer {
            border-top: 1px solid rgba(255,255,255,0.06);
            padding: 2rem 1.5rem;
            text-align: center;
            color: #475569;
            font-size: 0.85rem;
        }
        footer a { color: #6366f1; text-decoration: none; }

        @media (max-width: 768px) {
            .content h1 { font-size: 1.6rem; }
            .content h2 { font-size: 1.3rem; }
            .content { padding: 2rem 1rem 3rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <a href="/" class="logo">System<span>Craft</span></a>
            <nav>
                <a href="/">Designs</a>
                <a href="/about">About</a>
            </nav>
        </div>
    </header>

    <div class="content">
        <a href="/" class="back">&larr; All Designs</a>
        {{ content }}
    </div>

    <footer>
        <p>&copy; 2026 SystemCraft &middot; <a href="/">Home</a> &middot; <a href="/privacy">Privacy</a> &middot; <a href="https://github.com/iluzn/HLD-Designs">GitHub</a></p>
    </footer>

    <!-- Mermaid JS for diagrams -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({
            startOnLoad: true,
            theme: 'dark',
            themeVariables: {
                primaryColor: '#6366f1',
                primaryTextColor: '#e2e8f0',
                primaryBorderColor: '#4f46e5',
                lineColor: '#94a3b8',
                secondaryColor: '#1e1e2e',
                tertiaryColor: '#12121a',
                background: '#0a0a0f',
                mainBkg: '#1e1e2e',
                nodeBorder: '#4f46e5'
            }
        });

        // Convert ```mermaid code blocks to <div class="mermaid">
        document.querySelectorAll('pre code.language-mermaid').forEach(function(el) {
            var div = document.createElement('div');
            div.className = 'mermaid';
            div.textContent = el.textContent;
            el.parentElement.replaceWith(div);
        });

        // Re-run mermaid after DOM manipulation
        mermaid.run();
    </script>

</body>
</html>
