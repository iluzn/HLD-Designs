    <style>
        :root {
            --bg: #111118; --bg-card: rgba(25,25,35,0.6); --bg-header: rgba(17,17,24,0.85);
            --text: #e8edf3; --text-muted: #9ba3b0; --text-dim: #6b7280;
            --accent: #818cf8; --accent-light: #c4b5fd;
            --border: rgba(255,255,255,0.07); --border-hover: rgba(129,140,248,0.4);
            --code-bg: rgba(20,20,30,0.8); --glow: rgba(129,140,248,0.15);
            --glass: rgba(255,255,255,0.04); --glass-border: rgba(255,255,255,0.09);
        }
        [data-theme="light"] {
            --bg: #fafbff; --bg-card: rgba(255,255,255,0.7); --bg-header: rgba(250,251,255,0.85);
            --text: #0f172a; --text-muted: #374151; --text-dim: #6b7280;
            --accent: #4f46e5; --accent-light: #4338ca;
            --border: rgba(0,0,0,0.06); --border-hover: rgba(99,102,241,0.4);
            --code-bg: rgba(241,245,249,0.9); --glow: rgba(99,102,241,0.08);
            --glass: rgba(255,255,255,0.6); --glass-border: rgba(0,0,0,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; overflow-x: hidden; }

        /* Animated mesh gradient background */
        body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(ellipse 60% 40% at 20% 10%, rgba(129,140,248,0.08), transparent), radial-gradient(ellipse 50% 50% at 80% 80%, rgba(167,139,250,0.05), transparent), radial-gradient(ellipse 40% 30% at 50% 50%, rgba(99,102,241,0.03), transparent); pointer-events: none; z-index: 0; }
        [data-theme="light"] body::before { background: radial-gradient(ellipse 60% 40% at 20% 10%, rgba(99,102,241,0.04), transparent), radial-gradient(ellipse 50% 50% at 80% 80%, rgba(167,139,250,0.03), transparent); }

        /* Noise/grain texture overlay */
        body::after { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; opacity: 0.02; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); }
        [data-theme="light"] body::after { opacity: 0.015; }

        /* Scroll progress */
        #progress-bar { position: fixed; top: 0; left: 0; height: 2px; width: 0%; background: linear-gradient(90deg, var(--accent), #a78bfa, #f472b6); z-index: 1001; border-radius: 0 1px 1px 0; }

        /* Header — premium glass */
        header { position: sticky; top: 0; z-index: 100; padding: 0.7rem 0; background: var(--bg-header); backdrop-filter: blur(20px) saturate(1.4); -webkit-backdrop-filter: blur(20px) saturate(1.4); border-bottom: none; }
        header::after { content: ''; position: absolute; bottom: 0; left: 5%; right: 5%; height: 1px; background: linear-gradient(90deg, transparent, rgba(129,140,248,0.25), transparent); }
        .header-inner { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.15rem; font-weight: 800; color: var(--text); text-decoration: none; letter-spacing: -0.03em; display: flex; align-items: center; gap: 0.4rem; }
        .logo .logo-text span { background: linear-gradient(135deg, var(--accent), #c4b5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-icon { width: 22px; height: 22px; border-radius: 5px; }
        nav { display: flex; align-items: center; gap: 0.15rem; position: relative; }
        nav a { color: var(--text-muted); text-decoration: none; padding: 0.35rem 0.7rem; font-size: 0.82rem; font-weight: 500; border-radius: 6px; transition: all 0.2s; }
        nav a:hover { color: var(--text); background: rgba(129,140,248,0.06); }
        nav a.active { color: var(--accent); background: rgba(129,140,248,0.1); font-weight: 600; }

        #theme-btn, .theme-toggle { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.9rem; padding: 0.3rem 0.5rem; border-radius: 6px; margin-left: 0.4rem; transition: all 0.2s; line-height: 1; }
        #theme-btn:hover, .theme-toggle:hover { color: var(--text); }

        .hamburger { display: none; background: none; border: 1px solid var(--border); color: var(--text); cursor: pointer; padding: 0.3rem 0.5rem; font-size: 1.2rem; line-height: 1; border-radius: 6px; }
        .nav-links { display: flex; align-items: center; gap: 0.15rem; }

        @media (max-width: 768px) {
            .hamburger { display: block; }
            .nav-links { display: none; position: absolute; top: calc(100% + 0.5rem); right: 0; background: var(--bg-header); backdrop-filter: blur(20px) saturate(1.4); -webkit-backdrop-filter: blur(20px) saturate(1.4); border: 1px solid var(--border); border-radius: 12px; padding: 0.4rem; flex-direction: column; align-items: stretch; min-width: 160px; box-shadow: 0 16px 48px rgba(0,0,0,0.4); }
            .nav-links.open { display: flex; }
            .nav-links a { margin: 0; padding: 0.6rem 1rem; font-size: 0.88rem; border-radius: 8px; }
            .nav-links a:hover { background: rgba(129,140,248,0.08); }
            #theme-btn, .theme-toggle { margin: 0.3rem 0.5rem; }
        }

        /* Layout */
        .page-layout { max-width: 1200px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; display: grid; grid-template-columns: 1fr 200px; gap: 3rem; position: relative; z-index: 1; }

        /* TOC — glassmorphism sidebar */
        .toc { position: sticky; top: 80px; max-height: calc(100vh - 100px); overflow-y: auto; font-size: 0.78rem; padding: 1rem; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; backdrop-filter: blur(12px); }
        .toc-title { font-weight: 700; color: var(--text-dim); text-transform: uppercase; font-size: 0.65rem; letter-spacing: 0.08em; margin-bottom: 0.8rem; }
        .toc a { display: block; color: var(--text-dim); text-decoration: none; padding: 0.25rem 0 0.25rem 0.8rem; border-left: 2px solid transparent; transition: all 0.2s; line-height: 1.4; }
        .toc a:hover { color: var(--text); border-left-color: var(--accent); }
        .toc a.active { color: var(--accent-light); border-left-color: var(--accent); background: var(--glow); border-radius: 0 6px 6px 0; }
        .toc a.toc-h3 { padding-left: 1.4rem; font-size: 0.72rem; }

        .content { min-width: 0; overflow-x: hidden; position: relative; }
        .breadcrumbs { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 1.5rem; }
        .breadcrumbs a { color: var(--accent); text-decoration: none; transition: color 0.2s; }
        .breadcrumbs a:hover { color: var(--accent-light); }

        /* Typography — refined */
        .content h1 { font-size: 2.2rem; font-weight: 800; color: var(--text); margin-bottom: 1.5rem; letter-spacing: -0.03em; line-height: 1.2; }
        .content h2 { font-size: 1.35rem; font-weight: 700; color: var(--text); margin-top: 3rem; margin-bottom: 1rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--border); letter-spacing: -0.01em; }
        .content h3 { font-size: 1.05rem; font-weight: 600; color: var(--text); margin-top: 2rem; margin-bottom: 0.7rem; }
        .content h4 { font-size: 0.95rem; font-weight: 600; color: var(--text-muted); margin-top: 1.5rem; margin-bottom: 0.5rem; }
        .content p { margin-bottom: 1rem; color: var(--text-muted); line-height: 1.8; }
        .content a { color: var(--accent); text-decoration: none; background-image: linear-gradient(var(--accent), var(--accent)); background-size: 0% 1px; background-repeat: no-repeat; background-position: left bottom; transition: background-size 0.3s ease, color 0.2s; }
        .content a:hover { color: var(--accent-light); background-size: 100% 1px; }
        .content strong { color: var(--text); font-weight: 600; }
        .content ul, .content ol { margin-bottom: 1rem; padding-left: 1.5rem; color: var(--text-muted); }
        .content li { margin-bottom: 0.5rem; line-height: 1.7; }

        /* Code blocks — glassmorphism */
        .content code { font-family: 'JetBrains Mono', monospace; font-size: 0.83em; padding: 2px 7px; border-radius: 5px; }
        [data-theme="dark"] .content code { background: rgba(30,30,50,0.8); color: #c4b5fd; border: 1px solid rgba(255,255,255,0.08); }
        [data-theme="light"] .content code { background: rgba(79,70,229,0.08); color: #3730a3; border: 1px solid rgba(79,70,229,0.15); }
        .content pre { position: relative; background: var(--code-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 1.2rem 1.4rem; overflow-x: auto; margin-bottom: 1.5rem; backdrop-filter: blur(8px); }
        .content pre code { background: none !important; border: none !important; padding: 0 !important; font-size: 0.82rem; }
        [data-theme="dark"] .content pre { background: rgba(20,20,30,0.8); color: #e2e8f0; }
        [data-theme="dark"] .content pre code { color: #e2e8f0 !important; }
        [data-theme="light"] .content pre { background: #f8f9fc; color: #1e293b; border-color: rgba(0,0,0,0.08); }
        [data-theme="light"] .content pre code { color: #1e293b !important; }
        [data-theme="light"] .content pre code .token.comment, [data-theme="light"] .content pre code .token.prolog { color: #6b7280; }
        [data-theme="light"] .content pre code .token.keyword { color: #7c3aed; }
        [data-theme="light"] .content pre code .token.string { color: #059669; }
        [data-theme="light"] .content pre code .token.function { color: #2563eb; }
        [data-theme="light"] .content pre code .token.number { color: #d97706; }
        [data-theme="light"] .content pre code .token.operator { color: #dc2626; }
        [data-theme="light"] .content pre code .token.class-name { color: #7c3aed; }
        [data-theme="light"] .content pre code .token.punctuation { color: #374151; }

        /* Tabbed code blocks */
        .code-tabs { margin-bottom: 1.5rem; border: 1px solid var(--glass-border); border-radius: 12px; overflow: hidden; background: var(--code-bg); backdrop-filter: blur(8px); }
        .code-tabs .tab-buttons { display: flex; background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--glass-border); }
        .code-tabs .tab-btn { padding: 0.5rem 1rem; font-size: 0.76rem; font-weight: 600; color: var(--text-muted); background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .code-tabs .tab-btn:hover { color: var(--text); }
        .code-tabs .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .code-tabs .tab-content { display: none; }
        .code-tabs .tab-content.active { display: block; }
        .code-tabs .tab-content pre { border: none; border-radius: 0; margin: 0; }

        .copy-btn { position: absolute; top: 10px; right: 10px; background: var(--glass); border: 1px solid var(--glass-border); color: var(--text-muted); padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; cursor: pointer; opacity: 0; transition: all 0.2s; backdrop-filter: blur(8px); }
        .content pre:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
        .copy-btn.copied { color: #4ade80; border-color: #4ade80; }

        /* Tables — glassmorphism */
        .content table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; font-size: 0.85rem; display: block; overflow-x: auto; border-radius: 12px; }
        .content th { background: var(--glass); color: var(--text); padding: 0.7rem 0.9rem; text-align: left; font-weight: 600; font-size: 0.8rem; border-bottom: 1px solid var(--glass-border); }
        .content td { padding: 0.6rem 0.9rem; border-bottom: 1px solid var(--border); color: var(--text-muted); transition: background 0.2s; }
        .content tr:hover td { background: var(--glass); box-shadow: inset 0 0 20px rgba(129,140,248,0.03); }

        /* Blockquotes */
        .content blockquote { position: relative; border-left: 3px solid var(--accent); padding: 1rem 1.2rem; margin-bottom: 1.2rem; background: var(--glass); border-radius: 0 12px 12px 0; backdrop-filter: blur(8px); border: 1px solid var(--glass-border); border-left: 3px solid var(--accent); }
        .content blockquote p { color: var(--text-muted); margin-bottom: 0; font-size: 0.88rem; }

        /* 💡 Hint blocks */
        .hint-block { display: block; margin-top: 0.5rem; padding: 0.6rem 0.9rem; background: rgba(129,140,248,0.06); border: 1px solid rgba(129,140,248,0.15); border-radius: 8px; font-size: 0.83rem; color: var(--text-muted); line-height: 1.6; }
        [data-theme="light"] .hint-block { background: rgba(79,70,229,0.04); border-color: rgba(79,70,229,0.12); }

        .mermaid { background: var(--code-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; text-align: center; overflow-x: auto; max-width: 100%; backdrop-filter: blur(8px); }
        .mermaid .node rect, .mermaid .node polygon, .mermaid .node circle { opacity: 0.85; }
        .content hr { border: none; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), rgba(167,139,250,0.5), transparent); margin: 2.5rem 0; opacity: 0.4; }

        /* Deep Dive styling */
        .deep-dive-section { margin-bottom: 2rem; }
        .deep-dive-section > h3 { position: relative; padding-left: 0; border-left: 3px solid var(--accent); padding: 0.6rem 1rem; background: rgba(129,140,248,0.05); border-radius: 0 10px 10px 0; margin-bottom: 1rem; font-size: 1rem; }
        [data-theme="light"] .deep-dive-section > h3 { background: rgba(79,70,229,0.04); }

        .deep-dive-tabs { display: flex; gap: 0; margin-bottom: 0; border-bottom: 1px solid var(--border); }
        .deep-dive-tab { padding: 0.5rem 1rem; font-size: 0.78rem; font-weight: 600; cursor: pointer; border: none; background: none; color: var(--text-dim); border-bottom: 2px solid transparent; transition: all 0.2s; display: flex; align-items: center; gap: 0.4rem; }
        .deep-dive-tab:hover { color: var(--text-muted); background: var(--glass); }
        .deep-dive-tab.active { border-bottom-color: var(--accent); color: var(--text); }
        .deep-dive-tab .tab-dot { width: 8px; height: 8px; border-radius: 50%; }
        .deep-dive-tab .tab-dot.dot-bad { background: #ef4444; }
        .deep-dive-tab .tab-dot.dot-good { background: #f59e0b; }
        .deep-dive-tab .tab-dot.dot-great { background: #10b981; }

        .deep-dive-panel { display: none; padding: 1rem 0; animation: dd-fadein 0.25s ease; }
        .deep-dive-panel.active { display: block; }
        @keyframes dd-fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        .deep-dive-panel[data-level="bad"] { border-left: 3px solid #ef4444; padding-left: 1rem; margin-left: 0.2rem; }
        .deep-dive-panel[data-level="good"] { border-left: 3px solid #f59e0b; padding-left: 1rem; margin-left: 0.2rem; }
        .deep-dive-panel[data-level="great"] { border-left: 3px solid #10b981; padding-left: 1rem; margin-left: 0.2rem; }

        /* Scroll reveal animation */
        .content h2, .content h3, .content p, .content pre, .content table, .content blockquote, .content ul, .content ol { animation: fadeInUp 0.4s ease both; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        /* Back to top — glass style */
        #back-to-top { position: fixed; bottom: 2rem; right: 2rem; background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); color: var(--accent); width: 42px; height: 42px; border-radius: 12px; cursor: pointer; font-size: 1.1rem; display: none; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(0,0,0,0.3); transition: all 0.3s; z-index: 50; }
        #back-to-top:hover { transform: translateY(-3px); box-shadow: 0 12px 32px var(--glow); border-color: var(--accent); }
        #back-to-top.visible { display: flex; }

        /* Mobile TOC */
        .mobile-toc-btn { display: none; position: fixed; bottom: 2rem; left: 2rem; background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); color: var(--text-muted); padding: 0.5rem 1rem; border-radius: 20px; cursor: pointer; font-size: 0.8rem; z-index: 50; box-shadow: 0 8px 24px rgba(0,0,0,0.3); transition: all 0.3s; }
        .mobile-toc-btn:hover { border-color: var(--accent); color: var(--accent); }
        .mobile-toc-drawer { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-header); backdrop-filter: blur(20px) saturate(1.2); border-top: 1px solid var(--glass-border); max-height: 50vh; overflow-y: auto; padding: 1.5rem; z-index: 200; border-radius: 20px 20px 0 0; }
        .mobile-toc-drawer.open { display: block; }
        .mobile-toc-drawer a { display: block; padding: 0.5rem 0; color: var(--text-muted); text-decoration: none; font-size: 0.88rem; border-bottom: 1px solid var(--border); }
        .mobile-toc-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 199; }
        .mobile-toc-overlay.open { display: block; }

        footer { position: relative; z-index: 1; border-top: 1px solid var(--glass-border); padding: 2.5rem 1.5rem; text-align: center; color: var(--text-dim); font-size: 0.8rem; }
        footer a { color: var(--accent); text-decoration: none; }

        /* Page load animation */
        .page-layout { animation: pageIn 0.4s ease both; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(129,140,248,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(129,140,248,0.4); }
        [data-theme="light"] ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.15); }
        [data-theme="light"] ::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,0.3); }

        /* Selection color */
        ::selection { background: rgba(129,140,248,0.3); color: var(--text); }
        [data-theme="light"] ::selection { background: rgba(99,102,241,0.2); }

        /* Override Prism theme to match our glassmorphism */
        pre[class*="language-"], code[class*="language-"] { font-family: 'JetBrains Mono', monospace !important; font-size: 0.82rem !important; }
        pre[class*="language-"] { background: var(--code-bg) !important; border: 1px solid var(--glass-border) !important; border-radius: 12px !important; padding: 1.2rem 1.4rem !important; }
        .token.comment, .token.prolog { color: #6b7280 !important; }
        .token.keyword { color: #c084fc !important; }
        .token.string { color: #86efac !important; }
        .token.function { color: #93c5fd !important; }
        .token.number { color: #fbbf24 !important; }
        .token.operator { color: #f472b6 !important; }
        .token.class-name { color: #67e8f9 !important; }
        .token.punctuation { color: #94a3b8 !important; }
        .token.boolean { color: #fbbf24 !important; }
        .token.annotation { color: #a78bfa !important; }

        // Problem progress tracker (skip on fundamentals/concepts pages)
        // NOTE: Runs deferred to ensure it executes AFTER the hint script's innerHTML replacement
        setTimeout(function() {
            var path = window.location.pathname;
            if (path.indexOf('fundamentals') !== -1 || path.indexOf('concepts') !== -1 || path.indexOf('approach') !== -1 || path.indexOf('guide') !== -1) return;
            var tables = document.querySelectorAll('.content table');
            if (!tables.length) return;
            var pageKey = 'progress:' + window.location.pathname;
            var saved = JSON.parse(localStorage.getItem(pageKey) || '{}');
            var total = 0;
            tables.forEach(function(table) {
                var headerRow = table.querySelector('thead tr, tr:first-child');
                if (!headerRow) return;
                var cells = headerRow.querySelectorAll('th, td');
                var hasProblemCol = false;
                cells.forEach(function(c) { var text = c.textContent.trim().toLowerCase(); if (text === '#' || text === 'problem') hasProblemCol = true; });
                if (!hasProblemCol) return;
                var th = document.createElement('th'); th.textContent = '✓'; th.style.width = '30px'; th.style.textAlign = 'center'; headerRow.insertBefore(th, headerRow.firstChild);
                var rows = table.querySelectorAll('tbody tr, tr:not(:first-child)');
                rows.forEach(function(row) {
                    var problemCell = row.querySelectorAll('td')[1];
                    if (!problemCell) return;
                    var problemName = problemCell.textContent.trim().substring(0, 60);
                    if (!problemName || problemName.length < 2) return;
                    total++;
                    var td = document.createElement('td'); td.style.textAlign = 'center';
                    var cb = document.createElement('input'); cb.type = 'checkbox'; cb.style.cssText = 'cursor:pointer;width:16px;height:16px;accent-color:var(--accent);';
                    if (!window._firebaseUser) { cb.disabled = true; cb.title = 'Sign in to track progress'; cb.style.opacity = '0.4'; cb.style.cursor = 'not-allowed'; }
                    if (saved[problemName]) cb.checked = true;
                    cb.addEventListener('change', function() { saved[problemName] = cb.checked; if (!cb.checked) delete saved[problemName]; localStorage.setItem(pageKey, JSON.stringify(saved)); updateProgressBar(); if (window.saveProgressToFirestore) window.saveProgressToFirestore(window.location.pathname, JSON.parse(localStorage.getItem(pageKey) || '{}')); });
                    td.appendChild(cb); row.insertBefore(td, row.firstChild);
                });
            });
            if (total > 0) {
                var bar = document.createElement('div'); bar.style.cssText = 'background:var(--glass);backdrop-filter:blur(8px);padding:0.6rem 1.2rem;margin-bottom:1.2rem;border:1px solid var(--glass-border);border-radius:10px;display:flex;align-items:center;gap:0.8rem;font-size:0.8rem;color:var(--text-muted);';
                var fill = document.createElement('div'); fill.style.cssText = 'flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;';
                var inner = document.createElement('div'); inner.id = 'progress-fill'; inner.style.cssText = 'height:100%;background:linear-gradient(90deg,var(--accent),#a78bfa);border-radius:3px;transition:width 0.4s;';
                fill.appendChild(inner);
                var label = document.createElement('span'); label.id = 'progress-label';
                bar.appendChild(label); bar.appendChild(fill);
                var content = document.querySelector('.content');
                if (content) content.insertBefore(bar, content.firstChild);
                updateProgressBar();
            }
            function updateProgressBar() {
                var currentDone = Object.keys(JSON.parse(localStorage.getItem(pageKey) || '{}')).length;
                var pct = total > 0 ? Math.round((currentDone / total) * 100) : 0;
                var fillEl = document.getElementById('progress-fill'), labelEl = document.getElementById('progress-label');
                if (fillEl) fillEl.style.width = pct + '%';
                if (labelEl) labelEl.textContent = currentDone + '/' + total + ' (' + pct + '%)';
                // Celebrate when all done
                if (currentDone === total && total > 0) {
                    var celebratedKey = 'celebrated:' + pageKey;
                    if (!sessionStorage.getItem(celebratedKey)) {
                        sessionStorage.setItem(celebratedKey, 'true');
                        if (typeof triggerCelebration === 'function') {
                            triggerCelebration('All Problems Completed!', 'Every single problem checked off. You are interview ready. 💪');
                        }
                    }
                }
            }
        }, 0);

    <!-- Deep dive Bad/Good/Great tabs -->
    <script>
    (function() {
        var content = document.querySelector('.content');
        if (!content) return;

        // Walk ALL direct and nested elements in order to properly detect boundaries
        var allElements = content.querySelectorAll('p, h2, h3, h4, hr, pre, table, blockquote, ul, ol, div.mermaid');
        var deepDiveGroups = [];
        var currentGroup = null;

        allElements.forEach(function(el) {
            var text = el.textContent.trim();
            var html = el.innerHTML || '';
            var tag = el.tagName.toLowerCase();

            // Boundary detection: end current group on h2, h3 (non Bad/Good/Great), or hr
            var isBoundary = tag === 'h2' || tag === 'hr';
            if (tag === 'h3' && !/^\*?\*?(Bad|Good|Great)[\s:—\*]/.test(text) && !html.match(/^<strong>(Bad|Good|Great)/)) {
                isBoundary = true;
            }

            if (isBoundary) {
                currentGroup = null;
                return;
            }

            var isBad = (tag === 'p' || tag === 'h4') && (/^\*?\*?Bad[\s:—\*]/.test(text) || html.match(/^<strong>Bad/));
            var isGood = (tag === 'p' || tag === 'h4') && (/^\*?\*?Good[\s:—\*]/.test(text) || html.match(/^<strong>Good/));
            var isGreat = (tag === 'p' || tag === 'h4') && (/^\*?\*?Great[\s:—\*]/.test(text) || html.match(/^<strong>Great/));

            if (isBad) {
                currentGroup = { bad: { trigger: el, content: [] }, good: null, great: null };
                deepDiveGroups.push(currentGroup);
            } else if (isGood && currentGroup) {
                currentGroup.good = { trigger: el, content: [] };
            } else if (isGreat && currentGroup) {
                currentGroup.great = { trigger: el, content: [] };
            } else if (currentGroup) {
                // Collect content between triggers
                if (currentGroup.great) {
                    currentGroup.great.content.push(el);
                } else if (currentGroup.good) {
                    currentGroup.good.content.push(el);
                } else if (currentGroup.bad) {
                    currentGroup.bad.content.push(el);
                }
            }
        });

        // Now for each group that has at least bad + good, build tabbed UI
        deepDiveGroups.forEach(function(group) {
            if (!group.bad || !group.good) return;

            var levels = [];
            if (group.bad) levels.push({ key: 'bad', label: 'Bad', data: group.bad });
            if (group.good) levels.push({ key: 'good', label: 'Good', data: group.good });
            if (group.great) levels.push({ key: 'great', label: 'Great', data: group.great });

            // Create wrapper
            var wrapper = document.createElement('div');
            wrapper.className = 'deep-dive-tabs-container';

            // Tab bar
            var tabBar = document.createElement('div');
            tabBar.className = 'deep-dive-tabs';
            levels.forEach(function(level, idx) {
                var tab = document.createElement('button');
                tab.className = 'deep-dive-tab' + (idx === 0 ? ' active' : '');
                tab.innerHTML = '<span class="tab-dot dot-' + level.key + '"></span>' + level.label;
                tab.setAttribute('data-level', level.key);
                tab.addEventListener('click', function() {
                    tabBar.querySelectorAll('.deep-dive-tab').forEach(function(t) { t.classList.remove('active'); });
                    tab.classList.add('active');
                    wrapper.querySelectorAll('.deep-dive-panel').forEach(function(p) { p.classList.remove('active'); });
                    wrapper.querySelector('.deep-dive-panel[data-level="' + level.key + '"]').classList.add('active');
                });
                tabBar.appendChild(tab);
            });
            wrapper.appendChild(tabBar);

            // Panels
            levels.forEach(function(level, idx) {
                var panel = document.createElement('div');
                panel.className = 'deep-dive-panel' + (idx === 0 ? ' active' : '');
                panel.setAttribute('data-level', level.key);
                // Add trigger text as the panel content
                var triggerClone = level.data.trigger.cloneNode(true);
                panel.appendChild(triggerClone);
                level.data.content.forEach(function(el) {
                    panel.appendChild(el.cloneNode(true));
                });
                wrapper.appendChild(panel);
            });

            // Insert wrapper before the bad trigger, then hide originals
            group.bad.trigger.parentNode.insertBefore(wrapper, group.bad.trigger);

            // Hide ALL original elements between bad trigger and end of group
            var allToHide = [group.bad.trigger].concat(group.bad.content);
            if (group.good) allToHide = allToHide.concat([group.good.trigger], group.good.content);
            if (group.great) allToHide = allToHide.concat([group.great.trigger], group.great.content);
            allToHide.forEach(function(el) { if (el) el.style.display = 'none'; });
        });

        // Highlight deep dive headings (h3 containing "Deep Dive")
        content.querySelectorAll('h3').forEach(function(h3) {
            if (/deep dive/i.test(h3.textContent)) {
                var section = document.createElement('div');
                section.className = 'deep-dive-section';
                h3.parentNode.insertBefore(section, h3);
                section.appendChild(h3);
            }
        });
    })();
    </script>

    onAuthStateChanged(auth, async function(user) {
        if (user) {
            window._firebaseUser = user;

            authBtn.classList.add('signed-in');

            authEmail.textContent = user.email;

            // Load progress from Firestore
            try {
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (userDoc.exists()) {
                    window._userProgress = userDoc.data().progress || {};
                } else {
                    // First time user — create document
                    await setDoc(doc(db, 'users', user.uid), {
                        email: user.email,
                        name: user.displayName,
                        photoURL: user.photoURL,
                        lastLogin: new Date().toISOString(),
                        progress: {}
                    });
                    window._userProgress = {};

                // One-time migration: push localStorage progress to Firestore
                migrateLocalStorageToFirestore(user.uid);

                // Restore checkboxes from Firestore data
                restoreProgressFromFirestore();

                    cb.disabled = false; cb.style.opacity = '1'; cb.style.cursor = 'pointer'; cb.title = '';

    // One-time migration: push all localStorage progress to Firestore
    async function migrateLocalStorageToFirestore(uid) {
        var migrationKey = 'firestore-migrated:' + uid;
        if (localStorage.getItem(migrationKey)) return; // Already migrated

        var localProgress = {};
        var hasData = false;

        // Find all localStorage keys that match 'progress:*'
        for (var i = 0; i < localStorage.length; i++) {
            var key = localStorage.key(i);
            if (key && key.startsWith('progress:')) {
                var pagePath = key.replace('progress:', '');
                var safeKey = pagePath.replace(/\//g, '_').replace(/^_|_$/g, '') || 'root';
                var data = JSON.parse(localStorage.getItem(key) || '{}');
                if (Object.keys(data).length > 0) {
                    // Merge: Firestore data takes priority, localStorage fills gaps
                    var existing = window._userProgress[safeKey] || {};
                    var merged = Object.assign({}, data, existing);
                    localProgress[safeKey] = merged;
                    hasData = true;
                }
            }
        }

        // Also migrate design-read status
        var hldDesigns = window._userProgress['hld-designs'] || {};
        for (var i = 0; i < localStorage.length; i++) {
            var key = localStorage.key(i);
            if (key && key.startsWith('design-read:')) {
                var designPath = key.replace('design-read:', '');
                var safeKey = designPath.replace(/\//g, '_').replace(/^_|_$/g, '');
                if (!hldDesigns[safeKey]) {
                    hldDesigns[safeKey] = localStorage.getItem(key);
                    hasData = true;
                }
            }
        }

        if (!hasData) {
            localStorage.setItem(migrationKey, 'true');
            return;
        }

        // Write merged progress to Firestore
        try {
            if (Object.keys(hldDesigns).length > 0) {
                localProgress['hld-designs'] = hldDesigns;
            }
            var merged = Object.assign({}, window._userProgress, localProgress);
            await updateDoc(doc(db, 'users', uid), { progress: merged });
            window._userProgress = merged;
            localStorage.setItem(migrationKey, 'true');
        } catch (err) {
            console.error('Migration error:', err);
        }
    }

    // Restore checkboxes from Firestore progress
    function restoreProgressFromFirestore() {
        if (!window._userProgress) return;
        var path = window.location.pathname;
        var key = path.replace(/\//g, '_').replace(/^_|_$/g, '');

        // Restore problem checkboxes (DSA pages)
        var pageProgress = window._userProgress[key];
        if (pageProgress) {
            // Save to localStorage so the progress tracker picks it up
            localStorage.setItem('progress:' + path, JSON.stringify(pageProgress));

            // Wait for checkboxes to be created by the progress tracker (runs in setTimeout(0))
            var attempts = 0;
            var restoreInterval = setInterval(function() {
                attempts++;
                var checkboxes = document.querySelectorAll('.content table input[type="checkbox"]');
                if (checkboxes.length > 0 || attempts > 20) {
                    clearInterval(restoreInterval);
                    checkboxes.forEach(function(cb) {
                        var row = cb.closest('tr');
                        if (!row) return;
                        var problemCell = row.querySelectorAll('td')[1];
                        if (!problemCell) return;
                        var problemName = problemCell.textContent.trim().substring(0, 60);
                        if (pageProgress[problemName]) {
                            cb.checked = true;
                        }
                    });
                    // Update progress bar
                    var fillEl = document.getElementById('progress-fill');
                    var labelEl = document.getElementById('progress-label');
                    if (fillEl && labelEl) {
                        var done = Object.keys(pageProgress).length;
                        var total = checkboxes.length;
                        var pct = total > 0 ? Math.round((done / total) * 100) : 0;
                        fillEl.style.width = pct + '%';
                        labelEl.textContent = done + '/' + total + ' (' + pct + '%)';
                    }
                }
            }, 200);
        }

        // Restore design-read status (HLD/LLD pages progress bar)
        var hldProgress = window._userProgress['hld-designs'] || {};
        Object.keys(hldProgress).forEach(function(k) {
            localStorage.setItem('design-read:/' + k.replace(/_/g, '/') + '/', hldProgress[k]);
        });
    }

    // Save progress to Firestore (called by checkbox handlers)
    window.saveProgressToFirestore = async function(pageKey, data) {
        if (!window._firebaseUser) return;
        try {
            var safeKey = pageKey.replace(/\//g, '_').replace(/^_|_$/g, '') || 'root';
            var userRef = doc(db, 'users', window._firebaseUser.uid);
            var userDoc = await getDoc(userRef);
            if (userDoc.exists()) {
                var existing = userDoc.data().progress || {};
                existing[safeKey] = data;
                await updateDoc(userRef, { progress: existing });
            } else {
                var progress = {};
                progress[safeKey] = data;
                await setDoc(userRef, {
                    email: window._firebaseUser.email,
                    name: window._firebaseUser.displayName,
                    progress: progress
                });
            }
        } catch (err) {
            console.error('Firestore write error:', err);
        }
    };

    // Save design-read completion to Firestore
    window.saveDesignReadToFirestore = async function(designPath) {
        if (!window._firebaseUser) return;
        try {
            var safeKey = designPath.replace(/\//g, '_').replace(/^_|_$/g, '');
            var userRef = doc(db, 'users', window._firebaseUser.uid);
            var userDoc = await getDoc(userRef);
            if (userDoc.exists()) {
                var existing = userDoc.data().progress || {};
                var hldDesigns = existing['hld-designs'] || {};
                hldDesigns[safeKey] = Date.now();
                existing['hld-designs'] = hldDesigns;
                await updateDoc(userRef, { progress: existing });
            }
        } catch (err) {
            console.error('Firestore design-read write error:', err);
        }
    };

                var text = h.textContent.trim();
                if (text.match(/deep dive|how|what|why|flow/i) && text.length > 10 && text.length < 120) {
                    questions.push(text.replace(/^\d+[\.\)]\s*/, '').replace(/^Deep Dive \d+[\s—:]+/i, ''));
                }
            });
            // Also extract from interview cheat sheet if present
            var cheatRows = document.querySelectorAll('.content table tr');
            cheatRows.forEach(function(row) {
                var cells = row.querySelectorAll('td');
                if (cells.length >= 1) {
                    var q = cells[0].textContent.trim().replace(/^[""]|[""]$/g, '');
                    if (q.length > 5 && q.length < 100 && q !== 'Question') questions.push(q);
                }
            });
            // Show max 5 unique questions
            var seen = {};
            var unique = questions.filter(function(q) { var k = q.toLowerCase(); if (seen[k]) return false; seen[k] = true; return true; }).slice(0, 5);
            var container = document.getElementById('self-test-questions');
            unique.forEach(function(q, i) {
                var div = document.createElement('div');
                div.style.cssText = 'background:rgba(129,140,248,0.05);border:1px solid var(--border);border-radius:8px;padding:0.6rem 0.9rem;font-size:0.82rem;color:var(--text-muted);cursor:pointer;transition:all 0.2s;';
                div.textContent = (i + 1) + '. ' + q;
                div.addEventListener('mouseenter', function() { div.style.borderColor = 'var(--accent)'; div.style.color = 'var(--text)'; });
                div.addEventListener('mouseleave', function() { div.style.borderColor = 'var(--border)'; div.style.color = 'var(--text-muted)'; });
                container.appendChild(div);
            });

            // Confidence buttons
            var confContainer = document.getElementById('confidence-btns');
            var levels = [
                { emoji: '😰', label: 'Need to re-read' },
                { emoji: '🤔', label: 'Got the gist' },
                { emoji: '😊', label: 'Could explain it' },
                { emoji: '🔥', label: 'Interview ready' }
            ];
            levels.forEach(function(l) {
                var btn = document.createElement('button');
                btn.style.cssText = 'background:var(--glass);border:1px solid var(--border);border-radius:8px;padding:0.4rem 0.7rem;cursor:pointer;font-size:0.75rem;color:var(--text-muted);transition:all 0.2s;display:flex;align-items:center;gap:0.3rem;flex:1 1 auto;justify-content:center;text-align:center;min-width:0;white-space:nowrap;';
                btn.innerHTML = l.emoji + ' <span>' + l.label + '</span>';
                btn.addEventListener('click', function() {
                    confContainer.querySelectorAll('button').forEach(function(b) { b.style.borderColor = 'var(--border)'; b.style.background = 'var(--glass)'; });
                    btn.style.borderColor = 'var(--accent)';
                    btn.style.background = 'rgba(129,140,248,0.1)';
                    localStorage.setItem('confidence:' + window.location.pathname, l.label);
                });
                var saved = localStorage.getItem('confidence:' + window.location.pathname);
                if (saved === l.label) { btn.style.borderColor = 'var(--accent)'; btn.style.background = 'rgba(129,140,248,0.1)'; }
                confContainer.appendChild(btn);
            });
        }
    })();
    </script>
</body>
</html>
