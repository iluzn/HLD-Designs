    <style>
        :root {
            --bg: #111118; --bg-card: rgba(25,25,35,0.6); --bg-header: rgba(17,17,24,0.85);
            --text: #e8edf3; --text-muted: #9ba3b0; --text-dim: #6b7280;
            --accent: #818cf8; --accent-light: #c4b5fd;
            --border: rgba(255,255,255,0.07); --border-hover: rgba(129,140,248,0.4);
            --code-bg: rgba(20,20,30,0.8); --glow: rgba(129,140,248,0.15);
            --glass: rgba(255,255,255,0.04); --glass-border: rgba(255,255,255,0.09);
        }
        [data-theme="light"] {
            --bg: #fafbff; --bg-card: rgba(255,255,255,0.7); --bg-header: rgba(250,251,255,0.85);
            --text: #0f172a; --text-muted: #475569; --text-dim: #94a3b8;
            --accent: #6366f1; --accent-light: #4f46e5;
            --border: rgba(0,0,0,0.06); --border-hover: rgba(99,102,241,0.4);
            --code-bg: rgba(241,245,249,0.9); --glow: rgba(99,102,241,0.08);
            --glass: rgba(255,255,255,0.6); --glass-border: rgba(0,0,0,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; overflow-x: hidden; }

        /* Animated mesh gradient background */
        body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(ellipse 60% 40% at 20% 10%, rgba(129,140,248,0.08), transparent), radial-gradient(ellipse 50% 50% at 80% 80%, rgba(167,139,250,0.05), transparent), radial-gradient(ellipse 40% 30% at 50% 50%, rgba(99,102,241,0.03), transparent); pointer-events: none; z-index: 0; }
        [data-theme="light"] body::before { background: radial-gradient(ellipse 60% 40% at 20% 10%, rgba(99,102,241,0.04), transparent), radial-gradient(ellipse 50% 50% at 80% 80%, rgba(167,139,250,0.03), transparent); }

        /* Noise/grain texture overlay */
        body::after { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; opacity: 0.02; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); }
        [data-theme="light"] body::after { opacity: 0.015; }

        /* Scroll progress */
        #progress-bar { position: fixed; top: 0; left: 0; height: 2px; width: 0%; background: linear-gradient(90deg, var(--accent), #a78bfa, #f472b6); z-index: 1001; border-radius: 0 1px 1px 0; }

        /* Header — premium glass */
        header { position: sticky; top: 0; z-index: 100; padding: 0.7rem 0; background: var(--bg-header); backdrop-filter: blur(20px) saturate(1.4); -webkit-backdrop-filter: blur(20px) saturate(1.4); border-bottom: none; }
        header::after { content: ''; position: absolute; bottom: 0; left: 5%; right: 5%; height: 1px; background: linear-gradient(90deg, transparent, rgba(129,140,248,0.25), transparent); }
        .header-inner { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.15rem; font-weight: 800; color: var(--text); text-decoration: none; letter-spacing: -0.03em; display: flex; align-items: center; gap: 0.4rem; }
        .logo span { background: linear-gradient(135deg, var(--accent), #c4b5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-icon { width: 22px; height: 22px; border-radius: 5px; }
        nav { display: flex; align-items: center; gap: 0.15rem; position: relative; }
        nav a { color: var(--text-muted); text-decoration: none; padding: 0.35rem 0.7rem; font-size: 0.82rem; font-weight: 500; border-radius: 6px; transition: all 0.2s; }
        nav a:hover { color: var(--text); background: rgba(129,140,248,0.06); }
        nav a.active { color: var(--accent); background: rgba(129,140,248,0.1); font-weight: 600; }

        #theme-btn, .theme-toggle { background: none; border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; font-size: 0.9rem; padding: 0.3rem 0.5rem; border-radius: 6px; margin-left: 0.4rem; transition: all 0.2s; line-height: 1; }
        #theme-btn:hover, .theme-toggle:hover { border-color: var(--accent); color: var(--text); }

        .hamburger { display: none; background: none; border: 1px solid var(--border); color: var(--text); cursor: pointer; padding: 0.3rem 0.5rem; font-size: 1.2rem; line-height: 1; border-radius: 6px; }
        .nav-links { display: flex; align-items: center; gap: 0.15rem; }

        @media (max-width: 768px) {
            .hamburger { display: block; }
            .nav-links { display: none; position: absolute; top: calc(100% + 0.5rem); right: 0; background: var(--bg-header); backdrop-filter: blur(20px) saturate(1.4); -webkit-backdrop-filter: blur(20px) saturate(1.4); border: 1px solid var(--border); border-radius: 12px; padding: 0.4rem; flex-direction: column; align-items: stretch; min-width: 160px; box-shadow: 0 16px 48px rgba(0,0,0,0.4); }
            .nav-links.open { display: flex; }
            .nav-links a { margin: 0; padding: 0.6rem 1rem; font-size: 0.88rem; border-radius: 8px; }
            .nav-links a:hover { background: rgba(129,140,248,0.08); }
            #theme-btn, .theme-toggle { margin: 0.3rem 0.5rem; }
        }

        /* Layout */
        .page-layout { max-width: 1200px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; display: grid; grid-template-columns: 1fr 200px; gap: 3rem; position: relative; z-index: 1; }

        /* TOC — glassmorphism sidebar */
        .toc { position: sticky; top: 80px; max-height: calc(100vh - 100px); overflow-y: auto; font-size: 0.78rem; padding: 1rem; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; backdrop-filter: blur(12px); }
        .toc-title { font-weight: 700; color: var(--text-dim); text-transform: uppercase; font-size: 0.65rem; letter-spacing: 0.08em; margin-bottom: 0.8rem; }
        .toc a { display: block; color: var(--text-dim); text-decoration: none; padding: 0.25rem 0 0.25rem 0.8rem; border-left: 2px solid transparent; transition: all 0.2s; line-height: 1.4; }
        .toc a:hover { color: var(--text); border-left-color: var(--accent); }
        .toc a.active { color: var(--accent-light); border-left-color: var(--accent); background: var(--glow); border-radius: 0 6px 6px 0; }
        .toc a.toc-h3 { padding-left: 1.4rem; font-size: 0.72rem; }

        .content { min-width: 0; overflow-x: hidden; position: relative; }
        .breadcrumbs { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 1.5rem; }
        .breadcrumbs a { color: var(--accent); text-decoration: none; transition: color 0.2s; }
        .breadcrumbs a:hover { color: var(--accent-light); }

        /* Typography — refined */
        .content h1 { font-size: 2.2rem; font-weight: 800; color: var(--text); margin-bottom: 1.5rem; letter-spacing: -0.03em; line-height: 1.2; }
        .content h2 { font-size: 1.35rem; font-weight: 700; color: var(--text); margin-top: 3rem; margin-bottom: 1rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--border); letter-spacing: -0.01em; }
        .content h3 { font-size: 1.05rem; font-weight: 600; color: var(--text); margin-top: 2rem; margin-bottom: 0.7rem; }
        .content h4 { font-size: 0.95rem; font-weight: 600; color: var(--text-muted); margin-top: 1.5rem; margin-bottom: 0.5rem; }
        .content p { margin-bottom: 1rem; color: var(--text-muted); line-height: 1.8; }
        .content a { color: var(--accent); text-decoration: none; background-image: linear-gradient(var(--accent), var(--accent)); background-size: 0% 1px; background-repeat: no-repeat; background-position: left bottom; transition: background-size 0.3s ease, color 0.2s; }
        .content a:hover { color: var(--accent-light); background-size: 100% 1px; }
        .content strong { color: var(--text); font-weight: 600; }
        .content ul, .content ol { margin-bottom: 1rem; padding-left: 1.5rem; color: var(--text-muted); }
        .content li { margin-bottom: 0.5rem; line-height: 1.7; }

        /* Code blocks — glassmorphism */
        .content code { font-family: 'JetBrains Mono', monospace; font-size: 0.83em; padding: 2px 7px; border-radius: 5px; }
        [data-theme="dark"] .content code { background: rgba(30,30,50,0.8); color: #c4b5fd; border: 1px solid rgba(255,255,255,0.08); }
        [data-theme="light"] .content code { background: rgba(99,102,241,0.08); color: #4f46e5; border: 1px solid rgba(99,102,241,0.15); }
        .content pre { position: relative; background: var(--code-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 1.2rem 1.4rem; overflow-x: auto; margin-bottom: 1.5rem; backdrop-filter: blur(8px); }
        .content pre code { background: none !important; border: none !important; padding: 0 !important; color: inherit !important; font-size: 0.82rem; }

        /* Tabbed code blocks */
        .code-tabs { margin-bottom: 1.5rem; border: 1px solid var(--glass-border); border-radius: 12px; overflow: hidden; background: var(--code-bg); backdrop-filter: blur(8px); }
        .code-tabs .tab-buttons { display: flex; background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--glass-border); }
        .code-tabs .tab-btn { padding: 0.5rem 1rem; font-size: 0.76rem; font-weight: 600; color: var(--text-muted); background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .code-tabs .tab-btn:hover { color: var(--text); }
        .code-tabs .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .code-tabs .tab-content { display: none; }
        .code-tabs .tab-content.active { display: block; }
        .code-tabs .tab-content pre { border: none; border-radius: 0; margin: 0; }

        .copy-btn { position: absolute; top: 10px; right: 10px; background: var(--glass); border: 1px solid var(--glass-border); color: var(--text-muted); padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; cursor: pointer; opacity: 0; transition: all 0.2s; backdrop-filter: blur(8px); }
        .content pre:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
        .copy-btn.copied { color: #4ade80; border-color: #4ade80; }

        /* Tables — glassmorphism */
        .content table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; font-size: 0.85rem; display: block; overflow-x: auto; border-radius: 12px; }
        .content th { background: var(--glass); color: var(--text); padding: 0.7rem 0.9rem; text-align: left; font-weight: 600; font-size: 0.8rem; border-bottom: 1px solid var(--glass-border); }
        .content td { padding: 0.6rem 0.9rem; border-bottom: 1px solid var(--border); color: var(--text-muted); transition: background 0.2s; }
        .content tr:hover td { background: var(--glass); box-shadow: inset 0 0 20px rgba(129,140,248,0.03); }

        /* Blockquotes */
        .content blockquote { position: relative; border-left: 3px solid var(--accent); padding: 1rem 1.2rem; margin-bottom: 1.2rem; background: var(--glass); border-radius: 0 12px 12px 0; backdrop-filter: blur(8px); border: 1px solid var(--glass-border); border-left: 3px solid var(--accent); }
        .content blockquote p { color: var(--text-muted); margin-bottom: 0; font-size: 0.88rem; }

        .mermaid { background: var(--code-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; text-align: center; overflow-x: auto; max-width: 100%; backdrop-filter: blur(8px); }
        .content hr { border: none; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), rgba(167,139,250,0.5), transparent); margin: 2.5rem 0; opacity: 0.4; }

        /* Scroll reveal animation */
        .content h2, .content h3, .content p, .content pre, .content table, .content blockquote, .content ul, .content ol { animation: fadeInUp 0.4s ease both; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        /* Back to top — glass style */
        #back-to-top { position: fixed; bottom: 2rem; right: 2rem; background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); color: var(--accent); width: 42px; height: 42px; border-radius: 12px; cursor: pointer; font-size: 1.1rem; display: none; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(0,0,0,0.3); transition: all 0.3s; z-index: 50; }
        #back-to-top:hover { transform: translateY(-3px); box-shadow: 0 12px 32px var(--glow); border-color: var(--accent); }
        #back-to-top.visible { display: flex; }

        /* Mobile TOC */
        .mobile-toc-btn { display: none; position: fixed; bottom: 2rem; left: 2rem; background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); color: var(--text-muted); padding: 0.5rem 1rem; border-radius: 20px; cursor: pointer; font-size: 0.8rem; z-index: 50; box-shadow: 0 8px 24px rgba(0,0,0,0.3); transition: all 0.3s; }
        .mobile-toc-btn:hover { border-color: var(--accent); color: var(--accent); }
        .mobile-toc-drawer { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-header); backdrop-filter: blur(20px) saturate(1.2); border-top: 1px solid var(--glass-border); max-height: 50vh; overflow-y: auto; padding: 1.5rem; z-index: 200; border-radius: 20px 20px 0 0; }
        .mobile-toc-drawer.open { display: block; }
        .mobile-toc-drawer a { display: block; padding: 0.5rem 0; color: var(--text-muted); text-decoration: none; font-size: 0.88rem; border-bottom: 1px solid var(--border); }
        .mobile-toc-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 199; }
        .mobile-toc-overlay.open { display: block; }

        footer { position: relative; z-index: 1; border-top: 1px solid var(--glass-border); padding: 2.5rem 1.5rem; text-align: center; color: var(--text-dim); font-size: 0.8rem; }
        footer a { color: var(--accent); text-decoration: none; }

        /* Page load animation */
        .page-layout { animation: pageIn 0.4s ease both; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(129,140,248,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(129,140,248,0.4); }
        [data-theme="light"] ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.15); }
        [data-theme="light"] ::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,0.3); }

        /* Selection color */
        ::selection { background: rgba(129,140,248,0.3); color: var(--text); }
        [data-theme="light"] ::selection { background: rgba(99,102,241,0.2); }

        /* Override Prism theme to match our glassmorphism */
        pre[class*="language-"], code[class*="language-"] { font-family: 'JetBrains Mono', monospace !important; font-size: 0.82rem !important; }
        pre[class*="language-"] { background: var(--code-bg) !important; border: 1px solid var(--glass-border) !important; border-radius: 12px !important; padding: 1.2rem 1.4rem !important; }
        .token.comment, .token.prolog { color: #6b7280 !important; }
        .token.keyword { color: #c084fc !important; }
        .token.string { color: #86efac !important; }
        .token.function { color: #93c5fd !important; }
        .token.number { color: #fbbf24 !important; }
        .token.operator { color: #f472b6 !important; }
        .token.class-name { color: #67e8f9 !important; }
        .token.punctuation { color: #94a3b8 !important; }
        .token.boolean { color: #fbbf24 !important; }
        .token.annotation { color: #a78bfa !important; }
        [data-theme="light"] .token.comment, [data-theme="light"] .token.prolog { color: #6b7280 !important; }
        [data-theme="light"] .token.keyword { color: #7c3aed !important; }
        [data-theme="light"] .token.string { color: #059669 !important; }
        [data-theme="light"] .token.function { color: #2563eb !important; }
        [data-theme="light"] .token.number { color: #d97706 !important; }
        [data-theme="light"] .token.class-name { color: #0891b2 !important; }

        /* Code language badge */
        .code-lang-badge { position: absolute; top: 8px; left: 12px; font-size: 0.6rem; font-weight: 700; color: var(--accent); background: var(--glass); border: 1px solid var(--glass-border); padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

        @media (max-width: 900px) {
            .page-layout { grid-template-columns: 1fr; }
            .toc { display: none; }
            .mobile-toc-btn { display: block; }
            .content h1 { font-size: 1.6rem; }
            .content h2 { font-size: 1.15rem; }
        }
    </style>
    <script>
        (function() { var t = localStorage.getItem('theme') || 'dark'; document.documentElement.setAttribute('data-theme', t); })();
    </script>

        <script>
            function setGiscusTheme(theme) {
                var iframe = document.querySelector('iframe.giscus-frame');
                if (iframe) { iframe.contentWindow.postMessage({ giscus: { setConfig: { theme: theme === 'light' ? 'light' : 'transparent_dark' } } }, 'https://giscus.app'); }

            setTimeout(function() { setGiscusTheme(document.documentElement.getAttribute('data-theme') || 'dark'); }, 2000);
            new MutationObserver(function(m) { m.forEach(function(mut) { if (mut.attributeName === 'data-theme') setGiscusTheme(document.documentElement.getAttribute('data-theme')); }); }).observe(document.documentElement, { attributes: true });

    <!-- Mermaid -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
        var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        mermaid.initialize({ startOnLoad: true, theme: isDark ? 'dark' : 'default',
            themeVariables: isDark ? { primaryColor:'#818cf8', primaryTextColor:'#f1f5f9', primaryBorderColor:'#6366f1', lineColor:'#94a3b8', secondaryColor:'#1e1e2e', tertiaryColor:'#0a0a0f', background:'#06060a', mainBkg:'#1e1e2e', nodeBorder:'#6366f1' } : {}
        });
        document.querySelectorAll('pre code.language-mermaid').forEach(function(el) {
            var div = document.createElement('div'); div.className = 'mermaid'; div.textContent = el.textContent; el.parentElement.replaceWith(div);
        });
        mermaid.run();
    </script>

    <script>
        // Theme toggle
        var btn = document.getElementById('theme-btn');
        function setTheme(t) { document.documentElement.setAttribute('data-theme', t); localStorage.setItem('theme', t); btn.textContent = t === 'dark' ? '☀️' : '🌙'; }
        btn.addEventListener('click', function() { setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); });
        setTheme(localStorage.getItem('theme') || 'dark');

        // Hamburger
        var hamburger = document.getElementById('hamburger-btn');
        var navLinks = document.getElementById('nav-links');
        if (hamburger && navLinks) {
            hamburger.addEventListener('click', function() { navLinks.classList.toggle('open'); });
            navLinks.querySelectorAll('a').forEach(function(a) { a.addEventListener('click', function() { navLinks.classList.remove('open'); }); });
            document.addEventListener('click', function(e) { if (!hamburger.contains(e.target) && !navLinks.contains(e.target)) navLinks.classList.remove('open'); });
        }

        // TOC
        (function() {
            var toc = document.getElementById('toc-links');
            var mobileToc = document.getElementById('mobile-toc-drawer');
            var headings = document.querySelectorAll('.content h2, .content h3');
            headings.forEach(function(h, i) {
                if (!h.id) h.id = 'section-' + i;
                var a = document.createElement('a'); a.href = '#' + h.id; a.textContent = h.textContent;
                if (h.tagName === 'H3') a.className = 'toc-h3';
                toc.appendChild(a);
                var ma = a.cloneNode(true); mobileToc.appendChild(ma);
                ma.addEventListener('click', function() { closeMobileToc(); });
            });
            var commentLink = document.createElement('a'); commentLink.href = '#comments-section'; commentLink.textContent = '💬 Comments'; commentLink.style.marginTop = '0.5rem'; commentLink.style.paddingTop = '0.5rem'; commentLink.style.borderTop = '1px solid var(--border)'; toc.appendChild(commentLink);
            var tocLinks = toc.querySelectorAll('a');
            window.addEventListener('scroll', function() { var current = ''; headings.forEach(function(h) { if (window.scrollY >= h.offsetTop - 100) current = h.id; }); tocLinks.forEach(function(a) { a.classList.toggle('active', a.getAttribute('href') === '#' + current); }); });
        })();

        // Mobile TOC
        var mBtn = document.getElementById('mobile-toc-btn'), mDrawer = document.getElementById('mobile-toc-drawer'), mOverlay = document.getElementById('mobile-toc-overlay');
        function closeMobileToc() { mDrawer.classList.remove('open'); mOverlay.classList.remove('open'); }
        mBtn.addEventListener('click', function() { mDrawer.classList.toggle('open'); mOverlay.classList.toggle('open'); });
        mOverlay.addEventListener('click', closeMobileToc);

        // Back to top
        var btt = document.getElementById('back-to-top');
        window.addEventListener('scroll', function() { btt.classList.toggle('visible', window.scrollY > 500); });
        btt.addEventListener('click', function() { window.scrollTo({ top: 0, behavior: 'smooth' }); });

        // Copy buttons
        document.querySelectorAll('.content pre').forEach(function(pre) {
            if (pre.querySelector('.mermaid')) return;
            var b = document.createElement('button'); b.className = 'copy-btn'; b.textContent = 'Copy';
            b.addEventListener('click', function() { var code = pre.querySelector('code'); navigator.clipboard.writeText(code ? code.textContent : pre.textContent); b.textContent = 'Copied!'; b.classList.add('copied'); setTimeout(function() { b.textContent = 'Copy'; b.classList.remove('copied'); }, 2000); });
            pre.appendChild(b);
        });

        // Code tabs
        document.querySelectorAll('.code-tabs').forEach(function(tabGroup) {
            var buttons = tabGroup.querySelectorAll('.tab-btn'), contents = tabGroup.querySelectorAll('.tab-content');
            buttons.forEach(function(btn, idx) { btn.addEventListener('click', function() { buttons.forEach(function(b) { b.classList.remove('active'); }); contents.forEach(function(c) { c.classList.remove('active'); }); btn.classList.add('active'); contents[idx].classList.add('active'); }); });
        });

        // Progress bar
        window.addEventListener('scroll', function() { var h = document.documentElement.scrollHeight - window.innerHeight; document.getElementById('progress-bar').style.width = (window.scrollY / h * 100) + '%'; });

        // Problem progress tracker
        (function() {
            var tables = document.querySelectorAll('.content table');
            if (!tables.length) return;
            var pageKey = 'progress:' + window.location.pathname;
            var saved = JSON.parse(localStorage.getItem(pageKey) || '{}');
            var total = 0;
            tables.forEach(function(table) {
                var headerRow = table.querySelector('thead tr, tr:first-child');
                if (!headerRow) return;
                var cells = headerRow.querySelectorAll('th, td');
                var hasProblemCol = false;
                cells.forEach(function(c) { var text = c.textContent.trim().toLowerCase(); if (text === '#' || text === 'problem') hasProblemCol = true; });
                if (!hasProblemCol) return;
                var th = document.createElement('th'); th.textContent = '✓'; th.style.width = '30px'; th.style.textAlign = 'center'; headerRow.insertBefore(th, headerRow.firstChild);
                var rows = table.querySelectorAll('tbody tr, tr:not(:first-child)');
                rows.forEach(function(row) {
                    var problemCell = row.querySelectorAll('td')[1];
                    if (!problemCell) return;
                    var problemName = problemCell.textContent.trim().substring(0, 60);
                    if (!problemName || problemName.length < 2) return;
                    total++;
                    var td = document.createElement('td'); td.style.textAlign = 'center';
                    var cb = document.createElement('input'); cb.type = 'checkbox'; cb.style.cssText = 'cursor:pointer;width:16px;height:16px;accent-color:var(--accent);';
                    if (saved[problemName]) cb.checked = true;
                    cb.addEventListener('change', function() { saved[problemName] = cb.checked; if (!cb.checked) delete saved[problemName]; localStorage.setItem(pageKey, JSON.stringify(saved)); updateProgressBar(); });
                    td.appendChild(cb); row.insertBefore(td, row.firstChild);
                });
            });
            if (total > 0) {
                var bar = document.createElement('div'); bar.style.cssText = 'background:var(--glass);backdrop-filter:blur(8px);padding:0.6rem 1.2rem;margin-bottom:1.2rem;border:1px solid var(--glass-border);border-radius:10px;display:flex;align-items:center;gap:0.8rem;font-size:0.8rem;color:var(--text-muted);';
                var fill = document.createElement('div'); fill.style.cssText = 'flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;';
                var inner = document.createElement('div'); inner.id = 'progress-fill'; inner.style.cssText = 'height:100%;background:linear-gradient(90deg,var(--accent),#a78bfa);border-radius:3px;transition:width 0.4s;';
                fill.appendChild(inner);
                var label = document.createElement('span'); label.id = 'progress-label';
                bar.appendChild(label); bar.appendChild(fill);
                var content = document.querySelector('.content');
                if (content) content.insertBefore(bar, content.firstChild);
                updateProgressBar();
            }
            function updateProgressBar() {
                var currentDone = Object.keys(JSON.parse(localStorage.getItem(pageKey) || '{}')).length;
                var pct = total > 0 ? Math.round((currentDone / total) * 100) : 0;
                var fillEl = document.getElementById('progress-fill'), labelEl = document.getElementById('progress-label');
                if (fillEl) fillEl.style.width = pct + '%';
                if (labelEl) labelEl.textContent = currentDone + '/' + total + ' (' + pct + '%)';
            }
        })();
    </script>

    <script>
    // Add language badge to code blocks
    document.querySelectorAll('pre code[class*="language-"]').forEach(function(code) {
        var lang = code.className.match(/language-(\w+)/);
        if (lang && lang[1] && lang[1] !== 'mermaid') {
            var badge = document.createElement('span');
            badge.className = 'code-lang-badge';
            badge.textContent = lang[1].toUpperCase();
            code.parentElement.style.position = 'relative';
            code.parentElement.appendChild(badge);
        }
    });

    // Header glow on scroll
    window.addEventListener('scroll', function() {
        var header = document.querySelector('header');
        if (window.scrollY > 20) {
            header.style.borderBottomColor = 'rgba(129,140,248,0.15)';
            header.style.boxShadow = '0 4px 20px rgba(0,0,0,0.3)';
        } else {
            header.style.borderBottomColor = '';
            header.style.boxShadow = '';
        }
    });
    </script>

    <!-- Reading time -->
    <script>
    (function() {
        var content = document.querySelector('.content');
        if (!content) return;
        var text = content.textContent || content.innerText;
        var words = text.trim().split(/\s+/).length;
        var minutes = Math.ceil(words / 200);
        var badge = document.createElement('div');
        badge.style.cssText = 'font-size:0.78rem;color:var(--text-dim);margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem;';
        badge.innerHTML = '<span>⏱️ ' + minutes + ' min read</span>';
        var breadcrumbs = document.querySelector('.breadcrumbs');
        if (breadcrumbs && breadcrumbs.nextSibling) {
            breadcrumbs.parentNode.insertBefore(badge, breadcrumbs.nextSibling);
        }
    })();
    </script>
