title: SystemCraft
description: High-Level System Design notes for tech interviews
url: "https://systemcraft.in"
baseurl: ""

# ---------------------------------------------------------------------------
# Author / E-E-A-T identity. Google rewards demonstrated human expertise, so
# these fields power the Person author schema (JSON-LD) and the visible byline
# rendered on every content page.
#
# ACTION REQUIRED: replace the placeholder values below with your real name,
# a one-line credential, and your real profile links. The more concrete and
# verifiable this is, the more authorship trust it earns.
# ---------------------------------------------------------------------------
author:
  name: "SystemCraft"
  job_title: "Interview Prep Platform"
  bio: "Free system design, LLD, and DSA resources built by engineers who went through the interview grind at Indian and international tech companies."
  url: "https://systemcraft.in/about/"
  email: "systemcraft.in@gmail.com"
  image: "https://systemcraft.in/favicon-192x192.png"  # <-- replace with a real headshot for best E-E-A-T
  sameas:                                 # <-- add your real profile links (strengthens authorship)
    - "https://www.linkedin.com/company/systemcraft"
    - "https://x.com/systemcraft"
    - "https://github.com/systemcraft"

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

permalink: pretty

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Folders that are infra/source only — keep them out of the built site and sitemap
exclude:
  - og-worker/
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/

# ---------------------------------------------------------------------------
# Carbon Ads (https://www.carbonads.net). Leave blank until approved.
# After approval, paste the two IDs from your Carbon dashboard here and the
# ad unit turns on site-wide automatically (via _includes/carbon-ads.html).
#   carbon_serve:     the serve code, looks like "CE...ABC123"
#   carbon_placement: usually your site name, e.g. "systemcraftin"
# ---------------------------------------------------------------------------
carbon_serve: ""
carbon_placement: ""
