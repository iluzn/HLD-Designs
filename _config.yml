title: SystemCraft
description: High-Level System Design notes for tech interviews
url: "https://systemcraft.in"
baseurl: ""

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

permalink: pretty

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Folders that are infra/source only — keep them out of the built site and sitemap
exclude:
  - og-worker/
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/
