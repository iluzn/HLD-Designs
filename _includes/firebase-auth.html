    apiKey: "AIzaSyBRZYsCxcjkug4EVGmMuhAgKM4moRH_ewA",
    authDomain: "systemcraft-in.firebaseapp.com",
    projectId: "systemcraft-in",
    storageBucket: "systemcraft-in.firebasestorage.app",

const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

// Shared user-doc read: dedupe the load-time getDoc across the auth, judge and
// comp modules so a signed-in page load costs one read of users/{uid}, not three.
function readUserDoc(uid) {
  if (window.__scUDocUid !== uid || !window.__scUDoc) { window.__scUDocUid = uid; window.__scUDoc = getDoc(doc(db, 'users', uid)); }
  return window.__scUDoc;
}

const ADMIN_EMAIL = 'systemcraft.in@gmail.com';
function isAdminUser() { return !!(window._firebaseUser && window._firebaseUser.email === ADMIN_EMAIL); }

const authBtn = document.getElementById('auth-btn');
const authDropdown = document.getElementById('auth-dropdown');
const authName = document.getElementById('auth-name');
const authEmail = document.getElementById('auth-email');
const authSignout = document.getElementById('auth-signout');

window._firebaseUser = null;
window._firebaseDb = db;
window._userProgress = null;

// Google One Tap callback
window.handleOneTapCredential = function(response) {
    var credential = GoogleAuthProvider.credential(response.credential);
    signInWithCredential(auth, credential).catch(function(err) {
        console.error('One Tap sign-in error:', err);

};

    setTimeout(function() {
        if (window.google && window.google.accounts && !auth.currentUser) {
            window.google.accounts.id.initialize({
                client_id: '57513541148-sdbithm5smv31cc7a2tbs2fqkvk32s5e.apps.googleusercontent.com',
                callback: window.handleOneTapCredential,
                auto_select: true
            });
            window.google.accounts.id.prompt();

});

// Sign in button click
if (authBtn) {
    authBtn.addEventListener('click', function() {
        if (window._firebaseUser) {
            authDropdown.classList.toggle('open');
        } else {
            signInWithPopup(auth, provider).catch(function(err) {
                console.error('Popup failed, trying redirect:', err);
                signInWithRedirect(auth, provider);

        }

}

// Sign out
if (authSignout) {
    authSignout.addEventListener('click', function() {
        signOut(auth);
        authDropdown.classList.remove('open');
    });
}

// Close dropdown on outside click
document.addEventListener('click', function(e) {
    if (authBtn && authDropdown && !authBtn.contains(e.target) && !authDropdown.contains(e.target)) {
        authDropdown.classList.remove('open');
    }
});

// Auth state listener
onAuthStateChanged(auth, async function(user) {
    if (user) {
        window._firebaseUser = user;
        // Cache for instant paint on next load (prevents "Sign in" -> avatar flicker)
        try { localStorage.setItem('authCache', JSON.stringify({ photoURL: user.photoURL, displayName: user.displayName })); } catch (e) {}
        if (authBtn) {
            authBtn.innerHTML = '<img class="auth-avatar" src="' + user.photoURL + '" alt="' + user.displayName + '">';
            authBtn.classList.add('signed-in');
            authBtn.title = user.displayName;
        }
        if (authName) authName.textContent = user.displayName;
        if (authEmail) authEmail.textContent = user.email;

        // Load progress from Firestore
        try {
            const userDoc = await readUserDoc(user.uid);
            if (userDoc.exists()) {
                window._userProgress = userDoc.data().progress || {};
            } else {
                await setDoc(doc(db, 'users', user.uid), {
                    email: user.email,
                    name: user.displayName,
                    photoURL: user.photoURL,
                    lastLogin: new Date().toISOString(),
                    progress: {}
                });
                window._userProgress = {};
            }
            migrateLocalStorageToFirestore(user.uid);
            restoreProgressFromFirestore();
        } catch (err) {
            console.error('Firestore read error:', err);
        }

        // Enable checkboxes
        document.querySelectorAll('.content table input[type="checkbox"], .problem-card input[type="checkbox"], input.card-check').forEach(function(cb) {
            cb.disabled = false; cb.style.opacity = '1'; cb.style.cursor = 'pointer'; cb.title = 'Mark as completed';
        });
        // Remove sign-in banner
        var banner = document.getElementById('progress-signin-banner');
        if (banner) banner.remove();
        var progressBar = document.getElementById('progress-bar-container');
        if (progressBar) progressBar.style.opacity = '1';
        // Enable HLD/LLD progress strip
        var progressStrip = document.getElementById('progress-strip');
        if (progressStrip) progressStrip.style.opacity = '1';

        // Comments
        updateCommentUI();
        loadComments();

        // Notifications
        startNotifications(user.uid);

    } else {
        window._firebaseUser = null;
        window._userProgress = null;
        try { localStorage.removeItem('authCache'); } catch (e) {}
        if (authBtn) {
            authBtn.innerHTML = '<svg class="auth-google-icon" viewBox="0 0 18 18" fill="none"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.997 8.997 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>Sign in';
            authBtn.classList.remove('signed-in');
            authBtn.title = 'Sign in to sync progress';
        }
        if (authDropdown) authDropdown.classList.remove('open');

        // Disable checkboxes on sign-out
        document.querySelectorAll('.content table input[type="checkbox"], .problem-card input[type="checkbox"], input.card-check').forEach(function(cb) {
            cb.disabled = true; cb.style.opacity = '0.35'; cb.style.cursor = 'default'; cb.title = 'Sign in to track progress';
        });
        // Re-show progress bar as dimmed
        var progressBar = document.getElementById('progress-bar-container');
        if (progressBar) progressBar.style.opacity = '0.5';
        // Dim HLD/LLD progress strip
        var progressStrip = document.getElementById('progress-strip');
        if (progressStrip) progressStrip.style.opacity = '0.5';

        // Comments (still readable when signed out)
        updateCommentUI();
        loadComments();

        // Notifications
        stopNotifications();
    }
});

// Migration function
async function migrateLocalStorageToFirestore(uid) {
    var migrationKey = 'firestore-migrated:' + uid;
    if (localStorage.getItem(migrationKey)) return;
    var localProgress = {};
    var hasData = false;
    for (var i = 0; i < localStorage.length; i++) {
        var key = localStorage.key(i);
        if (key && key.startsWith('progress:')) {
            var pagePath = key.replace('progress:', '');
            var safeKey = pagePath.replace(/\//g, '_').replace(/^_|_$/g, '') || 'root';
            var data = JSON.parse(localStorage.getItem(key) || '{}');
            if (Object.keys(data).length > 0) {
                var existing = window._userProgress[safeKey] || {};
                localProgress[safeKey] = Object.assign({}, data, existing);
                hasData = true;
            }
        }
    }
    var hldDesigns = window._userProgress['hld-designs'] || {};
    for (var i = 0; i < localStorage.length; i++) {
        var key = localStorage.key(i);
        if (key && key.startsWith('design-read:')) {
            var designPath = key.replace('design-read:', '');
            var safeKey = designPath.replace(/\//g, '_').replace(/^_|_$/g, '');
            if (!hldDesigns[safeKey]) { hldDesigns[safeKey] = localStorage.getItem(key); hasData = true; }
        }
    }
    if (!hasData) { localStorage.setItem(migrationKey, 'true'); return; }
    try {
        if (Object.keys(hldDesigns).length > 0) localProgress['hld-designs'] = hldDesigns;
        var merged = Object.assign({}, window._userProgress, localProgress);
        await updateDoc(doc(db, 'users', uid), { progress: merged });
        window._userProgress = merged;
        localStorage.setItem(migrationKey, 'true');
    } catch (err) { console.error('Migration error:', err); }
}

// Restore function
function restoreProgressFromFirestore() {
    if (!window._userProgress) return;
    var path = window.location.pathname;
    var key = path.replace(/\//g, '_').replace(/^_|_$/g, '');
    var pageProgress = window._userProgress[key];
    if (pageProgress) {
        localStorage.setItem('progress:' + path, JSON.stringify(pageProgress));
        var attempts = 0;
        var restoreInterval = setInterval(function() {
            attempts++;
            var checkboxes = document.querySelectorAll('.content table input[type="checkbox"]');
            if (checkboxes.length > 0 || attempts > 20) {
                clearInterval(restoreInterval);
                checkboxes.forEach(function(cb) {
                    // Match on the data-problem attribute set at build time so we
                    // don't depend on column position (the checkbox column shifts indices).
                    var problemName = cb.dataset.problem;
                    if (!problemName) {
                        // Fallback for any checkbox built before data-problem existed
                        var row = cb.closest('tr');
                        if (row) {
                            var cells = row.querySelectorAll('td');
                            var nameCell = cells[2] || cells[1];
                            if (nameCell) problemName = nameCell.textContent.trim().substring(0, 60);
                        }
                    }
                    if (problemName && pageProgress[problemName]) cb.checked = true;
                });
                // Only update progress bar on DSA pages (table-based checkboxes)
                // Skip on HLD/LLD pages which have their own card-based progress
                if (checkboxes.length > 0) {
                    var fillEl = document.getElementById('progress-fill');
                    var labelEl = document.getElementById('progress-label');
                    if (fillEl && labelEl) {
                        var done = Object.keys(pageProgress).length;
                        var total = checkboxes.length;
                        var pct = total > 0 ? Math.round((done / total) * 100) : 0;
                        fillEl.style.width = pct + '%';
                        labelEl.textContent = done + '/' + total + ' (' + pct + '%)';
                    }
                }
            }
        }, 200);
    }
    var hldProgress = window._userProgress['hld-designs'] || {};
    Object.keys(hldProgress).forEach(function(k) {
        localStorage.setItem('design-read:/' + k.replace(/_/g, '/') + '/', hldProgress[k]);
    });
}

// Save progress (called by checkbox handlers)
window.saveProgressToFirestore = async function(pageKey, data) {
    if (!window._firebaseUser) return;
    try {
        var safeKey = pageKey.replace(/\//g, '_').replace(/^_|_$/g, '') || 'root';
        var userRef = doc(db, 'users', window._firebaseUser.uid);
        var userDoc = await getDoc(userRef);
        if (userDoc.exists()) {
            var existing = userDoc.data().progress || {};
            existing[safeKey] = data;
            await updateDoc(userRef, { progress: existing });
        } else {
            var progress = {};
            progress[safeKey] = data;
            await setDoc(userRef, { email: window._firebaseUser.email, name: window._firebaseUser.displayName, progress: progress });
        }
    } catch (err) { console.error('Firestore write error:', err); }
};

window.saveDesignReadToFirestore = async function(designPath) {
    if (!window._firebaseUser) return;
    try {
        var safeKey = designPath.replace(/\//g, '_').replace(/^_|_$/g, '');
        var userRef = doc(db, 'users', window._firebaseUser.uid);
        var userDoc = await getDoc(userRef);
        if (userDoc.exists()) {
            var existing = userDoc.data().progress || {};
            var hldDesigns = existing['hld-designs'] || {};
            hldDesigns[safeKey] = Date.now();
            existing['hld-designs'] = hldDesigns;
            await updateDoc(userRef, { progress: existing });
        }
    } catch (err) { console.error('Firestore design-read write error:', err); }
};

/* ---------------- Comments (Firestore-backed) ---------------- */

function timeAgo(ts) {
    if (!ts) return '';
    var s = Math.floor((Date.now() - ts) / 1000);
    if (s < 60) return 'just now';
    var m = Math.floor(s / 60); if (m < 60) return m + 'm ago';
    var h = Math.floor(m / 60); if (h < 24) return h + 'h ago';
    var d = Math.floor(h / 24); if (d < 30) return d + 'd ago';
    var mo = Math.floor(d / 30); if (mo < 12) return mo + 'mo ago';
    return Math.floor(mo / 12) + 'y ago';
}

// Toggle the post form vs the sign-in prompt based on auth state.
function updateCommentUI() {
    var form = document.getElementById('comment-form');
    var prompt = document.getElementById('comment-signin-prompt');
    if (!form || !prompt) return;
    if (window._firebaseUser) {
        form.style.display = 'flex';
        prompt.style.display = 'none';
        var avatar = document.getElementById('composer-avatar');
        if (avatar && window._firebaseUser.photoURL) {
            avatar.src = window._firebaseUser.photoURL;
            avatar.referrerPolicy = 'no-referrer';
        }
    } else {
        form.style.display = 'none';
        prompt.style.display = 'flex';
    }
}
window.updateCommentUI = updateCommentUI;

// Build a single comment element (top-level or reply). XSS-safe via DOM.
function buildCommentEl(c, isReply) {
    var myUid = window._firebaseUser ? window._firebaseUser.uid : null;
    var item = document.createElement('div');
    item.className = 'comment-item' + (isReply ? ' comment-reply' : '');

    var avatar = document.createElement('img');
    avatar.className = 'comment-avatar';
    avatar.src = c.photo || '/favicon-48x48.png';
    avatar.alt = c.name || 'User';
    avatar.referrerPolicy = 'no-referrer';
    item.appendChild(avatar);

    var body = document.createElement('div');
    body.className = 'comment-body';

    var head = document.createElement('div');
    head.className = 'comment-head';
    var nameEl = document.createElement('span');
    nameEl.className = 'comment-name';
    nameEl.textContent = c.name || 'Anonymous';
    head.appendChild(nameEl);
    // Show the Admin badge if the comment is tagged, or if the admin is
    // viewing their own (older, untagged) comment.
    if (c.role === 'admin' || (isAdminUser() && myUid && c.uid === myUid)) {
        var badge = document.createElement('span');
        badge.className = 'comment-admin-badge';
        badge.textContent = 'Admin';
        head.appendChild(badge);
    }
    var timeEl = document.createElement('span');
    timeEl.className = 'comment-time';
    timeEl.textContent = timeAgo(c.createdAt);
    head.appendChild(timeEl);

    // Author can delete their own comment; admin can delete any comment.
    if ((myUid && c.uid === myUid) || isAdminUser()) {
        var del = document.createElement('button');
        del.className = 'comment-delete';
        del.textContent = 'Delete';
        del.addEventListener('click', function() {
            if (confirm('Delete this comment?')) window.deleteComment(c._id);
        });
        head.appendChild(del);
    }
    body.appendChild(head);

    var textEl = document.createElement('div');
    textEl.className = 'comment-text';
    textEl.textContent = c.text || '';
    body.appendChild(textEl);

    // Actions row (Reply)
    var actions = document.createElement('div');
    actions.className = 'comment-actions';
    var replyBtn = document.createElement('button');
    replyBtn.className = 'comment-reply-btn';
    replyBtn.textContent = 'Reply';
    // Reply nests under the actual comment being replied to.
    var targetId = c._id;
    replyBtn.addEventListener('click', function() {
        if (!window._firebaseUser) { document.getElementById('auth-btn').click(); return; }
        // Toggle: if a reply form is already open here, close it.
        var existing = body.querySelector(':scope > .reply-form');
        if (existing) { existing.remove(); return; }
        var mention = isReply ? (c.name ? '@' + c.name + ' ' : '') : '';
        body.appendChild(buildReplyForm(targetId, mention));
    });
    actions.appendChild(replyBtn);
    body.appendChild(actions);

    item.appendChild(body);
    return item;
}

// Inline reply composer.
function buildReplyForm(parentId, mention) {
    var wrap = document.createElement('div');
    wrap.className = 'reply-form';
    var ta = document.createElement('textarea');
    ta.maxLength = 2000;
    ta.rows = 1;
    ta.placeholder = 'Write a reply…';
    ta.value = mention || '';
    var row = document.createElement('div');
    row.className = 'reply-form-row';
    var cancel = document.createElement('button');
    cancel.className = 'reply-cancel';
    cancel.textContent = 'Cancel';
    cancel.addEventListener('click', function() { wrap.remove(); });
    var post = document.createElement('button');
    post.className = 'reply-post';
    post.textContent = 'Reply';
    post.addEventListener('click', async function() {
        if (!ta.value.trim()) return;
        post.disabled = true; post.textContent = 'Posting…';
        var ok = await window.postComment(ta.value, parentId);
        if (!ok) { post.disabled = false; post.textContent = 'Reply'; }
    });
    ta.addEventListener('input', function() {
        ta.style.height = 'auto';
        ta.style.height = Math.min(ta.scrollHeight, 200) + 'px';
    });
    ta.addEventListener('keydown', function(e) {
        if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); post.click(); }
    });
    row.appendChild(cancel);
    row.appendChild(post);
    wrap.appendChild(ta);
    wrap.appendChild(row);
    attachMentionAutocomplete(ta);
    setTimeout(function() { ta.focus(); }, 0);
    return wrap;
}

// Lightweight @mention autocomplete driven by the page's commenters.
function attachMentionAutocomplete(textarea) {
    if (!textarea || textarea._mentionAttached) return;
    textarea._mentionAttached = true;
    var dd = null;
    function closeDD() { if (dd) { dd.remove(); dd = null; } }
    function getToken() {
        var pos = textarea.selectionStart;
        var before = textarea.value.substring(0, pos);
        var m = before.match(/@([^@\n]*)$/);
        if (!m) return null;
        return { query: m[1], at: pos - m[1].length - 1, caret: pos };
    }
    function show() {
        var info = getToken();
        if (!info) { closeDD(); return; }
        var myUid = window._firebaseUser ? window._firebaseUser.uid : null;
        var q = info.query.toLowerCase();
        var pool = (window._pageCommenters || []).filter(function(c) {
            return c.uid !== myUid && c.name && c.name.toLowerCase().indexOf(q) === 0;
        }).slice(0, 6);
        if (!pool.length) { closeDD(); return; }
        if (!dd) { dd = document.createElement('div'); dd.className = 'mention-dropdown'; document.body.appendChild(dd); }
        dd.innerHTML = '';
        pool.forEach(function(c) {
            var it = document.createElement('div'); it.className = 'mention-option';
            var img = document.createElement('img'); img.src = c.photo || '/favicon-48x48.png'; img.referrerPolicy = 'no-referrer';
            var nm = document.createElement('span'); nm.textContent = c.name;
            it.appendChild(img); it.appendChild(nm);
            it.addEventListener('mousedown', function(e) { e.preventDefault(); pick(c, getToken() || info); });
            dd.appendChild(it);
        });
        var r = textarea.getBoundingClientRect();
        dd.style.left = (window.scrollX + r.left) + 'px';
        dd.style.top = (window.scrollY + r.bottom + 4) + 'px';
        dd.style.width = Math.min(r.width, 260) + 'px';
    }
    function pick(c, info) {
        var val = textarea.value;
        textarea.value = val.substring(0, info.at) + '@' + c.name + ' ' + val.substring(info.caret);
        var newPos = info.at + c.name.length + 2;
        textarea.selectionStart = textarea.selectionEnd = newPos;
        closeDD();
        textarea.focus();
        textarea.dispatchEvent(new Event('input'));
    }
    textarea.addEventListener('input', show);
    textarea.addEventListener('keyup', function(e) { if (e.key === 'Escape') closeDD(); });
    textarea.addEventListener('blur', function() { setTimeout(closeDD, 150); });
}
window.attachMentionAutocomplete = attachMentionAutocomplete;

// Render the full threaded list into #comments-list.
function renderComments(items) {
    var listEl = document.getElementById('comments-list');
    if (!listEl) return;
    listEl.innerHTML = '';
    var countEl = document.getElementById('comment-count');
    if (countEl) countEl.textContent = items.length ? '(' + items.length + ')' : '';
    if (!items.length) {
        var empty = document.createElement('div');
        empty.className = 'comment-empty';
        empty.innerHTML = '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.6;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';
        var txt = document.createElement('span');
        txt.textContent = 'No comments yet. Be the first to start the discussion.';
        empty.appendChild(txt);
        listEl.appendChild(empty);
        return;
    }

    // Index comments by id and group children by their parent id.
    var byId = {};
    items.forEach(function(c) { byId[c._id] = c; });
    var childrenOf = {};
    var roots = [];
    items.forEach(function(c) {
        // A comment is a root if it has no parent, or its parent no longer
        // exists (parent was deleted) — orphans surface at the top level.
        if (c.parentId && byId[c.parentId]) {
            (childrenOf[c.parentId] = childrenOf[c.parentId] || []).push(c);
        } else {
            roots.push(c);
        }
    });
    roots.sort(function(a, b) { return (b.createdAt || 0) - (a.createdAt || 0); }); // newest first

    // Recursively render a comment and its nested replies.
    function renderNode(c, depth) {
        var frag = document.createDocumentFragment();
        frag.appendChild(buildCommentEl(c, depth > 0));
        var kids = childrenOf[c._id];
        if (kids && kids.length) {
            kids.sort(function(a, b) { return (a.createdAt || 0) - (b.createdAt || 0); }); // oldest first
            var thread = document.createElement('div');
            thread.className = 'comment-replies';
            // Cap the indent so deep threads don't run off-screen.
            if (depth >= 1) thread.style.marginLeft = '1.1rem';
            kids.forEach(function(k) { thread.appendChild(renderNode(k, depth + 1)); });
            frag.appendChild(thread);
        }
        return frag;
    }

    roots.forEach(function(root) { listEl.appendChild(renderNode(root, 0)); });
}

// Unique commenters on this page — the pool of people who can be @mentioned.
window._pageCommenters = [];
function updatePageCommenters(items) {
    var seen = {};
    var list = [];
    items.forEach(function(c) {
        if (c.uid && c.name && !seen[c.uid]) { seen[c.uid] = true; list.push({ uid: c.uid, name: c.name, photo: c.photo || '' }); }
    });
    window._pageCommenters = list;
}

window.loadComments = async function() {
    var listEl = document.getElementById('comments-list');
    if (!listEl) return;
    try {
        var q = query(collection(db, 'comments'), where('page', '==', window.location.pathname), limit(200));
        var snap = await getDocs(q);
        var items = [];
        snap.forEach(function(d) { var c = d.data(); c._id = d.id; items.push(c); });
        items.sort(function(a, b) { return (b.createdAt || 0) - (a.createdAt || 0); });
        updatePageCommenters(items);
        renderComments(items);
        backfillAdminRole(items);
    } catch (err) { console.error('Comment load error:', err); }
};

// One-time-per-load: tag the admin's older comments with role 'admin' so
// the badge is visible to all viewers, not just the admin.
async function backfillAdminRole(items) {
    if (!isAdminUser()) return;
    var myUid = window._firebaseUser.uid;
    var pending = items.filter(function(c) { return c.uid === myUid && c.role !== 'admin'; });
    if (!pending.length) return;
    for (var i = 0; i < pending.length; i++) {
        try { await updateDoc(doc(db, 'comments', pending[i]._id), { role: 'admin' }); } catch (err) {}
    }
}

window.postComment = async function(text, parentId) {
    if (!window._firebaseUser) return false;
    text = (text || '').trim();
    if (!text) return false;
    if (text.length > 2000) { alert('Comment is too long (max 2000 characters).'); return false; }
    try {
        var payload = {
            page: window.location.pathname,
            uid: window._firebaseUser.uid,
            name: window._firebaseUser.displayName || 'Anonymous',
            photo: window._firebaseUser.photoURL || '',
            text: text,
            parentId: parentId || null,
            createdAt: Date.now()
        };
        if (isAdminUser()) payload.role = 'admin';
        await addDoc(collection(db, 'comments'), payload);
        // Notify the parent author (reply) and anyone @mentioned, avoiding
        // double-notifying the same person.
        var notified = [];
        if (parentId) { var replyUid = await notifyReply(parentId, text); if (replyUid) notified.push(replyUid); }
        await notifyMentions(text, notified);
        await window.loadComments();
        return true;
    } catch (err) { console.error('Comment post error:', err); alert('Could not post comment. Please try again.'); return false; }
};

window.deleteComment = async function(id) {
    try {
        await deleteDoc(doc(db, 'comments', id));
        await window.loadComments();
    } catch (err) { console.error('Comment delete error:', err); }
};

// Initial load for signed-out visitors (auth listener also triggers this).
window.addEventListener('load', function() { if (window.loadComments) window.loadComments(); });

/* ---------------- Notifications (in-app) ---------------- */

var _notifUnsub = null;
var _notifItems = [];

// Write a notification to the author of the comment being replied to.
// Returns the notified recipient uid (or null) so callers can de-dupe.
async function notifyReply(parentId, text) {
    try {
        var pd = await getDoc(doc(db, 'comments', parentId));
        if (!pd.exists()) return null;
        var p = pd.data();
        if (!p.uid || p.uid === window._firebaseUser.uid) return null; // don't notify yourself
        await addDoc(collection(db, 'notifications'), {
            recipientUid: p.uid,
            fromUid: window._firebaseUser.uid,
            fromName: window._firebaseUser.displayName || 'Someone',
            fromPhoto: window._firebaseUser.photoURL || '',
            type: 'reply',
            page: window.location.pathname,
            snippet: (text || '').substring(0, 120),
            read: false,
            createdAt: Date.now()
        });
        return p.uid;
    } catch (err) { console.error('notifyReply error:', err); return null; }
}

// Notify any page commenters whose name is @mentioned in the text.
async function notifyMentions(text, alreadyNotified) {
    if (!text || !window._pageCommenters || !window._pageCommenters.length) return;
    alreadyNotified = alreadyNotified || [];
    var recipients = {};
    // Match longer names first so "@Ann Lee" wins over "@Ann".
    var pool = window._pageCommenters.slice().sort(function(a, b) { return (b.name || '').length - (a.name || '').length; });
    pool.forEach(function(c) {
        if (!c.uid || c.uid === window._firebaseUser.uid) return;
        if (alreadyNotified.indexOf(c.uid) !== -1) return;
        if (recipients[c.uid]) return;
        if (c.name && text.indexOf('@' + c.name) !== -1) recipients[c.uid] = c;
    });
    var uids = Object.keys(recipients);
    for (var i = 0; i < uids.length; i++) {
        try {
            await addDoc(collection(db, 'notifications'), {
                recipientUid: uids[i],
                fromUid: window._firebaseUser.uid,
                fromName: window._firebaseUser.displayName || 'Someone',
                fromPhoto: window._firebaseUser.photoURL || '',
                type: 'mention',
                page: window.location.pathname,
                snippet: (text || '').substring(0, 120),
                read: false,
                createdAt: Date.now()
            });
        } catch (err) { console.error('notifyMentions error:', err); }
    }
}

function startNotifications(uid) {
    var wrap = document.getElementById('notif-wrap');
    if (wrap) wrap.style.display = 'inline-flex';
    if (_notifUnsub) { _notifUnsub(); _notifUnsub = null; }
    try {
        var q = query(collection(db, 'notifications'), where('recipientUid', '==', uid), limit(50));
        _notifUnsub = onSnapshot(q, function(snap) {
            var arr = [];
            snap.forEach(function(d) { var n = d.data(); n._id = d.id; arr.push(n); });
            arr.sort(function(a, b) { return (b.createdAt || 0) - (a.createdAt || 0); });
            _notifItems = arr.slice(0, 30);
            renderNotifications(_notifItems);
        }, function(err) { console.error('Notification listener error:', err); });
    } catch (err) { console.error('startNotifications error:', err); }
}

function stopNotifications() {
    if (_notifUnsub) { _notifUnsub(); _notifUnsub = null; }
    _notifItems = [];
    var wrap = document.getElementById('notif-wrap');
    if (wrap) wrap.style.display = 'none';
    var dd = document.getElementById('notif-dropdown');
    if (dd) dd.classList.remove('open');
    var badge = document.getElementById('notif-badge');
    if (badge) badge.style.display = 'none';
}

function renderNotifications(items) {
    var badge = document.getElementById('notif-badge');
    var list = document.getElementById('notif-list');
    var unread = items.filter(function(n) { return !n.read; }).length;
    if (badge) {
        if (unread > 0) { badge.style.display = 'block'; badge.textContent = unread > 9 ? '9+' : String(unread); }
        else badge.style.display = 'none';
    }
    if (!list) return;
    list.innerHTML = '';
    if (!items.length) {
        var e = document.createElement('div'); e.className = 'notif-empty'; e.textContent = 'No notifications yet.';
        list.appendChild(e); return;
    }
    items.forEach(function(n) {
        var it = document.createElement('div');
        it.className = 'notif-item' + (n.read ? '' : ' unread');
        var img = document.createElement('img');
        img.src = n.fromPhoto || '/favicon-48x48.png';
        img.alt = n.fromName || ''; img.referrerPolicy = 'no-referrer';
        var body = document.createElement('div'); body.className = 'notif-item-body';
        var txt = document.createElement('div'); txt.className = 'notif-item-text';
        var strong = document.createElement('strong'); strong.textContent = n.fromName || 'Someone';
        var action = n.type === 'mention' ? ' mentioned you in a comment' : ' replied to your comment';
        txt.appendChild(strong); txt.appendChild(document.createTextNode(action));
        var snip = document.createElement('div'); snip.className = 'notif-item-snippet'; snip.textContent = n.snippet || '';
        var time = document.createElement('div'); time.className = 'notif-item-time'; time.textContent = timeAgo(n.createdAt);
        body.appendChild(txt); body.appendChild(snip); body.appendChild(time);
        it.appendChild(img); it.appendChild(body);
        if (!n.read) { var dot = document.createElement('div'); dot.className = 'notif-dot'; it.appendChild(dot); }
        it.addEventListener('click', function() { openNotification(n); });
        list.appendChild(it);
    });
}

async function openNotification(n) {
    try { if (!n.read) await updateDoc(doc(db, 'notifications', n._id), { read: true }); } catch (err) {}
    var target = (n.page || '/');
    if (window.location.pathname === target) {
        var el = document.getElementById('comments-section');
        if (el) { el.scrollIntoView({ behavior: 'smooth' }); }
        var dd = document.getElementById('notif-dropdown'); if (dd) dd.classList.remove('open');
    } else {
        window.location.href = target + '#comments-section';
    }
}

window.markAllNotificationsRead = async function() {
    var unread = _notifItems.filter(function(n) { return !n.read; });
    for (var i = 0; i < unread.length; i++) {
        try { await updateDoc(doc(db, 'notifications', unread[i]._id), { read: true }); } catch (err) {}
    }
};

// Wire the bell toggle, outside-click close, and mark-all button once.
window.addEventListener('load', function() {
    var bell = document.getElementById('notif-btn');
    var dd = document.getElementById('notif-dropdown');
    var markall = document.getElementById('notif-markall');
    if (bell && dd) {
        bell.addEventListener('click', function(e) { e.stopPropagation(); dd.classList.toggle('open'); });
        document.addEventListener('click', function(e) {
            if (!dd.contains(e.target) && !bell.contains(e.target)) dd.classList.remove('open');
        });
    }
    if (markall) markall.addEventListener('click', function(e) { e.stopPropagation(); window.markAllNotificationsRead(); });

    // Enable @mention autocomplete on the main comment composer.
    var mainInput = document.getElementById('comment-input');
    if (mainInput) attachMentionAutocomplete(mainInput);
});
</script>
