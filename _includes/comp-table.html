<!-- Interactive salary-band + application tracker.
     Reads window.SC_COMP_ALL = [{c,cat,loc:[],url,s1:[lo,hi],s2:[lo,hi],s3:[lo,hi]}]
     and window.SC_LEVEL ('s1'|'s2'|'s3'). Per-user status/comment persist in localStorage. -->
<style>
.ct-controls { display: flex; flex-wrap: wrap; gap: 0.6rem; align-items: center; margin: 1rem 0; }
#ct-q { flex: 1; min-width: 200px; background: var(--card-bg); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 0.55rem 0.9rem; font-size: 0.88rem; font-family: inherit; outline: none; transition: border-color 0.2s; }
#ct-q:focus { border-color: var(--accent); }
.ct-seg { display: inline-flex; flex-wrap: wrap; background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.ct-seg button { background: none; border: none; color: var(--text-muted); font-size: 0.78rem; font-weight: 600; padding: 0.5rem 0.8rem; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.ct-seg button:hover { color: var(--text); }
.ct-seg button.on { background: var(--accent); color: #fff; }
.ct-sel { background: var(--card-bg); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 0.5rem 0.7rem; font-size: 0.82rem; font-family: inherit; cursor: pointer; outline: none; }
.ct-min { width: 130px; }
.ct-min input { width: 62px; background: var(--card-bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 0.45rem 0.5rem; font-family: inherit; }
.ct-count { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 0.6rem; }
.ct-reset { font-size: 0.75rem; color: var(--accent); background: none; border: none; cursor: pointer; }
.ct-tablewrap { border: 1px solid var(--border); border-radius: 12px; overflow-x: auto; }
.ct-table { width: 100%; border-collapse: collapse; font-size: 0.86rem; min-width: 720px; }
.ct-table th { text-align: left; padding: 0.6rem 0.7rem; border-bottom: 1px solid var(--border); color: var(--text-muted); font-weight: 700; white-space: nowrap; cursor: pointer; user-select: none; background: var(--card-bg); position: sticky; top: 0; }
.ct-table th[data-k]:hover { color: var(--accent); }
.ct-table td { padding: 0.5rem 0.7rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
.ct-table tr:last-child td { border-bottom: none; }
.ct-table tr:nth-child(even) td { background: rgba(127,127,127,0.03); }
.ct-company { font-weight: 700; color: var(--text); white-space: nowrap; }
.ct-cat { font-size: 0.66rem; padding: 2px 8px; border-radius: 20px; background: var(--tag-bg); border: 1px solid var(--tag-border); color: var(--accent); white-space: nowrap; }
.ct-loc { color: var(--text-muted); font-size: 0.8rem; }
.ct-comp { font-weight: 700; color: var(--text); white-space: nowrap; }
.ct-apply { color: var(--accent); text-decoration: none; font-weight: 600; }
.ct-apply:hover { text-decoration: underline; }
.ct-stsel { border: 1px solid var(--border); border-radius: 7px; padding: 0.3rem 0.4rem; font-size: 0.76rem; font-family: inherit; background: var(--card-bg); color: var(--text); cursor: pointer; }
.ct-stsel[data-s="Applied"], .ct-stsel[data-s="Referral"] { border-color: var(--accent); color: var(--accent); }
.ct-stsel[data-s="Interviewing"] { border-color: #eab308; color: #eab308; }
.ct-stsel[data-s="Offer"] { border-color: #22c55e; color: #22c55e; }
.ct-stsel[data-s="Rejected"] { border-color: #ef4444; color: #ef4444; }
.ct-cmt { width: 100%; min-width: 120px; border: 1px solid var(--border); border-radius: 7px; padding: 0.3rem 0.5rem; font-size: 0.78rem; font-family: inherit; background: var(--card-bg); color: var(--text); }
.ct-empty { text-align: center; color: var(--text-dim); padding: 2rem; }
.ct-note { font-size: 0.72rem; color: var(--text-dim); margin-top: 0.6rem; }
@media (max-width: 700px) { .ct-hide-sm { display: none; } .ct-table { min-width: 560px; } }
</style>
<div id="ct-root"></div>

<script>
(function () {
function boot() {
 try {
  var LEVEL = window.SC_LEVEL || 's2';
  var ALL = (window.SC_COMP_ALL || []).filter(function (r) { return r[LEVEL]; });
  var STATUSES = ['Not started', 'Interested', 'Applied', 'Referral', 'Interviewing', 'Offer', 'Rejected'];
  var LSKEY = 'sc-comptrack-' + LEVEL;
  function loadTrack() {
    var local = {};
    try { local = JSON.parse(localStorage.getItem(LSKEY) || '{}'); } catch (e) {}
    // When signed in, Firestore data (window._scCompTrack) wins per company,
    // merged over any local edits made while signed out.
    if (window._scCompTrack) return Object.assign({}, local, window._scCompTrack[LEVEL] || {});
    return local;
  }
  var track = loadTrack();
  function save() {
    if (typeof window.scCompSave === 'function') window.scCompSave(LEVEL, track);
    else { try { localStorage.setItem(LSKEY, JSON.stringify(track)); } catch (e) {} }
  }
  // When Firebase finishes loading (or auth changes), reload and re-render.
  document.addEventListener('sc-comp-ready', function () { track = loadTrack(); render(); });
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }

  var cats = {}; ALL.forEach(function (r) { cats[r.cat] = 1; });
  var catList = Object.keys(cats).sort();
  var locs = {}; ALL.forEach(function (r) { r.loc.forEach(function (l) { locs[l] = 1; }); });
  var locList = Object.keys(locs).sort();

  var state = { q: '', cat: 'all', loc: 'all', min: 0, status: 'all', sortK: 'hi', sortDir: -1 };

  var root = document.getElementById('ct-root');
  root.innerHTML =
    '<div class="ct-controls">' +
      '<input id="ct-q" type="text" placeholder="Search company…" autocomplete="off">' +
      '<div class="ct-seg" id="ct-cat"><button data-v="all" class="on">All</button>' + catList.map(function (c) { return '<button data-v="' + esc(c) + '">' + esc(c) + '</button>'; }).join('') + '</div>' +
      '<select class="ct-sel" id="ct-loc"><option value="all">All locations</option>' + locList.map(function (l) { return '<option value="' + esc(l) + '">' + esc(l) + '</option>'; }).join('') + '</select>' +
      '<select class="ct-sel" id="ct-st"><option value="all">All statuses</option>' + STATUSES.map(function (s) { return '<option value="' + s + '">' + s + '</option>'; }).join('') + '</select>' +
      '<span class="ct-min">min <input id="ct-min" type="number" min="0" step="5" placeholder="0"> LPA</span>' +
    '</div>' +
    '<div class="ct-count"><span id="ct-cnt"></span> &middot; <button class="ct-reset" id="ct-reset">Reset filters</button></div>' +
    '<div class="ct-tablewrap"><table class="ct-table"><thead><tr>' +
      '<th data-k="c">Company</th>' +
      '<th data-k="cat" class="ct-hide-sm">Category</th>' +
      '<th data-k="loc" class="ct-hide-sm">Locations</th>' +
      '<th data-k="hi">Est. Comp (LPA) ▼</th>' +
      '<th>Status</th><th>Comment</th>' +
      '<th class="ct-hide-sm">Careers</th>' +
    '</tr></thead><tbody id="ct-body"></tbody></table></div>' +
    '<div class="ct-note">Your Status &amp; Comment are saved only in this browser (localStorage). Comp figures are estimates from public sources — not offers.</div>';

  var body = document.getElementById('ct-body');
  var cntEl = document.getElementById('ct-cnt');
  var qEl = document.getElementById('ct-q');
  var minEl = document.getElementById('ct-min');

  function pass(r) {
    if (state.q && r.c.toLowerCase().indexOf(state.q.toLowerCase()) < 0) return false;
    if (state.cat !== 'all' && r.cat !== state.cat) return false;
    if (state.loc !== 'all' && r.loc.indexOf(state.loc) < 0) return false;
    if (state.min && r[LEVEL][1] < state.min) return false;
    if (state.status !== 'all') { var st = (track[r.c] && track[r.c].status) || 'Not started'; if (st !== state.status) return false; }
    return true;
  }
  function render() {
    var rows = ALL.filter(pass);
    rows.sort(function (a, b) {
      var k = state.sortK, av, bv;
      if (k === 'loc') { av = a.loc.join(','); bv = b.loc.join(','); }
      else if (k === 'hi') { av = a[LEVEL][1]; bv = b[LEVEL][1]; }
      else { av = ('' + a[k]).toLowerCase(); bv = ('' + b[k]).toLowerCase(); }
      return av < bv ? -state.sortDir : av > bv ? state.sortDir : 0;
    });
    cntEl.textContent = rows.length + ' of ' + ALL.length + ' companies';
    if (!rows.length) { body.innerHTML = '<tr><td colspan="7" class="ct-empty">No companies match these filters.</td></tr>'; return; }
    body.innerHTML = rows.map(function (r) {
      var band = r[LEVEL], comp = band[0] + '–' + band[1] + 'L';
      var url = r.url.indexOf('http') === 0 ? r.url : 'https://' + r.url;
      var t = track[r.c] || {}; var st = t.status || 'Not started';
      var opts = STATUSES.map(function (s) { return '<option' + (s === st ? ' selected' : '') + '>' + s + '</option>'; }).join('');
      return '<tr>' +
        '<td class="ct-company">' + esc(r.c) + '</td>' +
        '<td class="ct-hide-sm"><span class="ct-cat">' + esc(r.cat) + '</span></td>' +
        '<td class="ct-hide-sm ct-loc">' + r.loc.join(', ') + '</td>' +
        '<td class="ct-comp">' + comp + '</td>' +
        '<td><select class="ct-stsel" data-c="' + esc(r.c) + '" data-s="' + st + '">' + opts + '</select></td>' +
        '<td><input class="ct-cmt" data-c="' + esc(r.c) + '" value="' + esc(t.comment || '') + '" placeholder="note…"></td>' +
        '<td class="ct-hide-sm"><a class="ct-apply" href="' + url + '" target="_blank" rel="noopener">↗</a></td>' +
        '</tr>';
    }).join('');
  }

  qEl.oninput = function () { state.q = qEl.value; render(); };
  minEl.oninput = function () { state.min = +minEl.value || 0; render(); };
  document.getElementById('ct-loc').onchange = function (e) { state.loc = e.target.value; render(); };
  document.getElementById('ct-st').onchange = function (e) { state.status = e.target.value; render(); };
  document.getElementById('ct-cat').onclick = function (e) {
    var b = e.target.closest('button'); if (!b) return;
    state.cat = b.dataset.v;
    this.querySelectorAll('button').forEach(function (x) { x.classList.remove('on'); }); b.classList.add('on');
    render();
  };
  document.querySelectorAll('.ct-table th[data-k]').forEach(function (th) {
    th.onclick = function () {
      var k = th.dataset.k;
      if (state.sortK === k) state.sortDir *= -1; else { state.sortK = k; state.sortDir = (k === 'hi') ? -1 : 1; }
      render();
    };
  });
  // Persist status/comment edits (event delegation, survives re-render)
  body.addEventListener('change', function (e) {
    var c;
    if (e.target.classList.contains('ct-stsel')) {
      c = e.target.dataset.c; track[c] = track[c] || {}; track[c].status = e.target.value; save();
      e.target.setAttribute('data-s', e.target.value);
      if (state.status !== 'all') render();
    } else if (e.target.classList.contains('ct-cmt')) {
      c = e.target.dataset.c; track[c] = track[c] || {}; track[c].comment = e.target.value; save();
    }
  });
  document.getElementById('ct-reset').onclick = function () {
    state = { q: '', cat: 'all', loc: 'all', min: 0, status: 'all', sortK: 'hi', sortDir: -1 };
    qEl.value = ''; minEl.value = ''; document.getElementById('ct-loc').value = 'all'; document.getElementById('ct-st').value = 'all';
    document.querySelectorAll('#ct-cat button').forEach(function (x, i) { x.classList.toggle('on', i === 0); });
    render();
  };
  render();
 } catch (err) {
  var r = document.getElementById('ct-root');
  if (r) r.innerHTML = '<div style="padding:1rem;color:#f87171;border:1px solid #f87171;border-radius:8px;">Tracker failed to load: ' + (err && err.message ? err.message : err) + '</div>';
  if (window.console) console.error('comp-table error', err);
 }
}
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot); else boot();
})();
</script>
