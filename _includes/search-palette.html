<!-- Command palette (⌘K / Ctrl-K) -->
<style>
#sc-search-overlay { position: fixed; inset: 0; z-index: 3000; display: none; align-items: flex-start; justify-content: center; padding-top: 12vh; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
#sc-search-overlay.open { display: flex; animation: scFade 0.15s ease; }
[data-theme="light"] #sc-search-overlay { background: rgba(15,23,42,0.35); }
@keyframes scFade { from { opacity: 0; } to { opacity: 1; } }
.sc-search-box { width: 92%; max-width: 560px; background: var(--header-bg, var(--bg-header, #fff)); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 24px 64px rgba(0,0,0,0.45); overflow: hidden; animation: scPop 0.16s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes scPop { from { opacity: 0; transform: translateY(-8px) scale(0.98); } to { opacity: 1; transform: none; } }
.sc-search-top { display: flex; align-items: center; gap: 0.6rem; padding: 0.9rem 1.1rem; border-bottom: 1px solid var(--border); }
.sc-search-top svg { color: var(--text-dim); flex-shrink: 0; }
#sc-search-input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: inherit; font-size: 1rem; }
#sc-search-input::placeholder { color: var(--text-dim); }
.sc-search-esc { font-size: 0.62rem; color: var(--text-dim); border: 1px solid var(--border); border-radius: 5px; padding: 0.1rem 0.35rem; }
.sc-search-results { max-height: 56vh; overflow-y: auto; padding: 0.4rem; }
.sc-result { display: flex; align-items: center; gap: 0.7rem; padding: 0.6rem 0.8rem; border-radius: 10px; cursor: pointer; text-decoration: none; }
.sc-result.active, .sc-result:hover { background: rgba(129,140,248,0.12); }
.sc-result-cat { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: #fff; background: var(--accent); padding: 0.12rem 0.4rem; border-radius: 5px; flex-shrink: 0; min-width: 44px; text-align: center; }
.sc-result-cat.hld { background: #4ade80; } .sc-result-cat.lld { background: #fbbf24; } .sc-result-cat.dsa { background: #f472b6; } .sc-result-cat.concept { background: #818cf8; } .sc-result-cat.company { background: #60a5fa; } .sc-result-cat.guide { background: #a78bfa; }
.sc-result-body { min-width: 0; }
.sc-result-title { font-size: 0.88rem; color: var(--text); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sc-result-desc { font-size: 0.74rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sc-search-empty { padding: 2rem 1rem; text-align: center; color: var(--text-dim); font-size: 0.85rem; }
.sc-search-foot { display: flex; gap: 1rem; padding: 0.55rem 1rem; border-top: 1px solid var(--border); font-size: 0.68rem; color: var(--text-dim); }
.sc-search-foot b { color: var(--text-muted); font-weight: 600; }
.sc-search-btn { background: none; border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; padding: 0.3rem 0.6rem; border-radius: 8px; margin-left: 0.15rem; display: inline-flex; align-items: center; gap: 0.35rem; font-size: 0.78rem; transition: all 0.2s; }
.sc-search-btn:hover { color: var(--text); border-color: var(--accent); }
.sc-search-btn .sc-kbd { font-size: 0.62rem; border: 1px solid var(--border); border-radius: 4px; padding: 0.02rem 0.28rem; color: var(--text-dim); }
@media (max-width: 600px) { .sc-search-btn .sc-kbd { display: none; } }
</style>

<div id="sc-search-overlay">
  <div class="sc-search-box" role="dialog" aria-label="Search">
    <div class="sc-search-top">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="sc-search-input" type="text" placeholder="Search designs, concepts, DSA, companies…" autocomplete="off" spellcheck="false">
      <span class="sc-search-esc">ESC</span>
    </div>
    <div class="sc-search-results" id="sc-search-results"></div>
    <div class="sc-search-foot"><span><b>↑↓</b> navigate</span><span><b>↵</b> open</span><span><b>esc</b> close</span></div>
  </div>
</div>

<script>
(function() {
    var overlay = document.getElementById('sc-search-overlay');
    var input = document.getElementById('sc-search-input');
    var results = document.getElementById('sc-search-results');
    if (!overlay || !input || !results) return;

    var index = null, filtered = [], active = 0, loaded = false;
    var isMac = /Mac|iPhone|iPad/.test(navigator.platform);

    function catFor(url) {
        if (url.indexOf('/hld/') === 0 || url === '/hld') return { key: 'hld', label: 'HLD' };
        if (url.indexOf('/lld/') === 0 || url === '/lld') return { key: 'lld', label: 'LLD' };
        if (url.indexOf('/concepts') === 0) return { key: 'concept', label: 'Concept' };
        if (url.indexOf('/companies') === 0) return { key: 'company', label: 'Company' };
        if (url.indexOf('/dsa') === 0 || url.indexOf('/cheatsheet') === 0 || url.indexOf('/the-') === 0) return { key: 'dsa', label: 'DSA' };
        if (url.indexOf('guide') !== -1 || url.indexOf('approach') !== -1) return { key: 'guide', label: 'Guide' };
        return { key: 'guide', label: 'Page' };
    }

    function loadIndex() {
        if (loaded) return Promise.resolve();
        return fetch('/search.json').then(function(r) { return r.json(); }).then(function(data) {
            index = data.filter(function(p) { return p.title && p.url; });
            loaded = true;
        }).catch(function() { index = []; loaded = true; });
    }

    function score(item, q) {
        var t = (item.title || '').toLowerCase();
        var d = (item.desc || '').toLowerCase();
        if (t === q) return 100;
        if (t.indexOf(q) === 0) return 90;
        if (t.indexOf(q) !== -1) return 70;
        if (d.indexOf(q) !== -1) return 40;
        return 0;
    }

    function render() {
        var q = input.value.trim().toLowerCase();
        if (!index) { results.innerHTML = '<div class="sc-search-empty">Loading…</div>'; return; }
        if (!q) {
            filtered = index.slice(0, 8);
        } else {
            filtered = index.map(function(it) { return { it: it, s: score(it, q) }; })
                .filter(function(x) { return x.s > 0; })
                .sort(function(a, b) { return b.s - a.s; })
                .slice(0, 12)
                .map(function(x) { return x.it; });
        }
        active = 0;
        if (!filtered.length) { results.innerHTML = '<div class="sc-search-empty">No matches for "' + q.replace(/</g,'') + '"</div>'; return; }
        results.innerHTML = '';
        filtered.forEach(function(it, i) {
            var cat = catFor(it.url);
            var a = document.createElement('a');
            a.className = 'sc-result' + (i === 0 ? ' active' : '');
            a.href = it.url;
            a.innerHTML = '<span class="sc-result-cat ' + cat.key + '">' + cat.label + '</span>' +
                '<span class="sc-result-body"><span class="sc-result-title"></span><span class="sc-result-desc"></span></span>';
            a.querySelector('.sc-result-title').textContent = it.title.replace(/ [\|\-–].*$/, '');
            a.querySelector('.sc-result-desc').textContent = it.desc || it.url;
            a.addEventListener('mouseenter', function() { setActive(i); });
            results.appendChild(a);
        });
    }

    function setActive(i) {
        var els = results.querySelectorAll('.sc-result');
        if (!els.length) return;
        active = (i + els.length) % els.length;
        els.forEach(function(e, idx) { e.classList.toggle('active', idx === active); });
        els[active].scrollIntoView({ block: 'nearest' });
    }

    function open() {
        overlay.classList.add('open');
        document.body.style.overflow = 'hidden';
        loadIndex().then(render);
        setTimeout(function() { input.focus(); }, 20);
    }
    function close() {
        overlay.classList.remove('open');
        document.body.style.overflow = '';
        input.value = '';
    }
    window.openSearch = open;

    input.addEventListener('input', render);
    input.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowDown') { e.preventDefault(); setActive(active + 1); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); setActive(active - 1); }
        else if (e.key === 'Enter') {
            e.preventDefault();
            var els = results.querySelectorAll('.sc-result');
            if (els[active]) window.location.href = els[active].href;
        } else if (e.key === 'Escape') { close(); }
    });
    overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });

    // Global shortcut: Cmd/Ctrl+K, and "/" when not typing.
    document.addEventListener('keydown', function(e) {
        if ((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'K')) { e.preventDefault(); overlay.classList.contains('open') ? close() : open(); }
        else if (e.key === '/' && !/^(INPUT|TEXTAREA|SELECT)$/.test(document.activeElement.tagName) && !document.activeElement.isContentEditable) { e.preventDefault(); open(); }
    });

    // Inject a search button into the nav on every page.
    function injectButton() {
        var nav = document.querySelector('nav');
        if (!nav || document.querySelector('.sc-search-btn')) return;
        var btn = document.createElement('button');
        btn.className = 'sc-search-btn';
        btn.setAttribute('aria-label', 'Search');
        btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><span class="sc-kbd">' + (isMac ? '⌘K' : 'Ctrl K') + '</span>';
        btn.addEventListener('click', open);
        var themeBtn = document.getElementById('theme-btn');
        if (themeBtn) nav.insertBefore(btn, themeBtn); else nav.insertBefore(btn, nav.firstChild);
    }
    if (document.readyState !== 'loading') injectButton(); else document.addEventListener('DOMContentLoaded', injectButton);
})();
</script>
