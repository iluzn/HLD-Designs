<script>
(function () {
  var P = window.SC_LC;
  if (!P) return;

  var ENDPOINT = window.SC_RUNNER_ENDPOINT || 'https://systemcraft-og.shaswat-kumar03.workers.dev';
  var CM_BASE = 'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16';
  var CODE_KEY = 'sc-lc-' + P.id;         // per-problem code, keyed by lang
  var LANG_KEY = 'sc-lc-lang';            // global preferred language
  var SOLVED_KEY = 'sc-lc-solved';        // array of solved slugs
  var SUBS_KEY = 'sc-lc-subs-' + P.id;    // submission history for this problem
  var DISCUSS_KEY = 'sc-lc-discuss-' + P.id;

  var META = {
    java: { name: 'Java', piston: 'java', mode: 'text/x-java', file: 'Main.java' },
    python: { name: 'Python3', piston: 'python', mode: 'python', file: 'main.py' },
    cpp: { name: 'C++', piston: 'c++', mode: 'text/x-c++src', file: 'main.cpp' },
    javascript: { name: 'JavaScript', piston: 'javascript', mode: 'javascript', file: 'main.js' },
  };
  // Order: Java first (default), then others that the problem provides.
  var LANG_KEYS = ['java', 'python', 'cpp', 'javascript'].filter(function (k) { return P.langs[k] && META[k]; });

  var SAMPLE = 3; // number of visible sample cases that "Run" executes
  var langSel, editorHost, runBtn, submitBtn, resetBtn, statusEl, consoleBody, consoleTabs, leftBody, leftTabs;
  var cm, curTab = 'cases', activeCase = 0, lastResults = null, descHtml = '';

  function esc(s) { return String(s == null ? '' : s).replace(/[&<>]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]; }); }
  function normalize(s) { return String(s == null ? '' : s).replace(/\r\n/g, '\n').split('\n').map(function (l) { return l.replace(/\s+$/, ''); }).join('\n').replace(/\n+$/, '').trim(); }
  function lsGet(k, d) { try { var v = localStorage.getItem(k); return v == null ? d : JSON.parse(v); } catch (e) { return d; } }
  function lsSet(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) {} }

  function savedCode() { return lsGet(CODE_KEY, {}); }
  function persistCode(lang, code) { var s = savedCode(); s[lang] = code; lsSet(CODE_KEY, s); }
  function stubFor(lang) { var s = savedCode(); return (s[lang] != null) ? s[lang] : (P.langs[lang].stub || ''); }
  function prefLang() { var l = lsGet(LANG_KEY, 'java'); return LANG_KEYS.indexOf(l) !== -1 ? l : LANG_KEYS[0]; }
  function curLang() { return langSel.value; }

  // Solved + submissions live in the signed-in user's Firestore doc (via
  // judge-firebase.html), so they are per-account and synced. Falls back to a
  // local anonymous bucket when signed out.
  function judgeData() { return window._scJudge || { solved: [], subs: {} }; }
  function isSolved() { var d = judgeData(); return !!(d.solved && d.solved.indexOf(P.id) !== -1); }
  function markSolved() { if (window.scJudgeMarkSolved) window.scJudgeMarkSolved(P.id); }
  function subs() { var d = judgeData(); return (d.subs && d.subs[P.id]) || []; }
  function addSub(rec) { if (window.scJudgeAddSub) window.scJudgeAddSub(P.id, rec); }

  // ---- asset loading ----
  function loadCss(h) { return new Promise(function (r) { if (document.querySelector('link[href="' + h + '"]')) return r(); var l = document.createElement('link'); l.rel = 'stylesheet'; l.href = h; l.onload = r; l.onerror = r; document.head.appendChild(l); }); }
  function loadJs(s) { return new Promise(function (res, rej) { if (document.querySelector('script[src="' + s + '"]')) return res(); var e = document.createElement('script'); e.src = s; e.onload = res; e.onerror = rej; document.head.appendChild(e); }); }
  function loadCM() {
    return Promise.all([
      loadCss(CM_BASE + '/codemirror.min.css'), loadCss(CM_BASE + '/theme/material-darker.min.css'), loadCss(CM_BASE + '/theme/eclipse.min.css'),
    ]).then(function () { return loadJs(CM_BASE + '/codemirror.min.js'); })
      .then(function () {
        return Promise.all([
          loadJs(CM_BASE + '/mode/clike/clike.min.js'), loadJs(CM_BASE + '/mode/python/python.min.js'),
          loadJs(CM_BASE + '/mode/javascript/javascript.min.js'), loadJs(CM_BASE + '/addon/edit/closebrackets.min.js'),
          loadJs(CM_BASE + '/addon/edit/matchbrackets.min.js'),
        ]);
      });
  }
  function themeName() { return document.documentElement.getAttribute('data-theme') === 'light' ? 'eclipse' : 'material-darker'; }

  // ---- execution ----
  function execute(lang, source, stdin) {
    var m = META[lang];
    return fetch(ENDPOINT + '/execute', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ language: m.piston, version: '*', files: [{ name: m.file, content: source }], stdin: stdin || '' }),
    }).then(function (r) {
      if (r.status === 429) return new Promise(function (x) { setTimeout(x, 1200); }).then(function () { return execute(lang, source, stdin); });
      return r.json();
    });
  }

  var busy = false;
  // All cases run in ONE execution: the harness reads T then loops, printing
  // one output line per case. We compare stdout line-by-line to expected.
  function runCases(cases, isSubmit) {
    if (busy || !cm) return;
    busy = true; runBtn.disabled = true; submitBtn.disabled = true;
    statusEl.textContent = isSubmit ? 'Judging…' : 'Running…';
    curTab = 'result'; syncConsoleTabs();
    consoleBody.innerHTML = '<div class="lc-verdict run"><span class="lc-spinner"></span>&nbsp;&nbsp;' + (isSubmit ? 'Judging ' : 'Running ') + cases.length + ' case' + (cases.length > 1 ? 's' : '') + '…</div>';

    var lang = curLang();
    var code = cm.getValue();
    var source = code + '\n\n' + (P.langs[lang].harness || '');
    var combined = cases.length + '\n' + cases.map(function (c) { return c.stdin; }).join('\n');

    execute(lang, source, combined).then(function (d) {
      var results = new Array(cases.length);
      var compileErr = null, firstFail = -1, tle = false, runtimeErr = null;

      if (d && d.error && !d.run && !d.compile) {
        for (var i = 0; i < cases.length; i++) results[i] = { error: true };
        firstFail = 0;
      } else if (d.compile && d.compile.code !== 0 && d.compile.stderr) {
        compileErr = d.compile.stderr;
      } else {
        var run = d.run || {};
        tle = run.signal === 'SIGKILL';
        runtimeErr = run.stderr || '';
        var raw = (run.stdout || '').replace(/\r/g, '').split('\n');
        for (var j = 0; j < cases.length; j++) {
          var got = j < raw.length ? raw[j] : null;
          var pass = !tle && got !== null && normalize(got) === normalize(cases[j].expected);
          results[j] = { pass: pass, out: got === null ? '' : got, timedOut: tle, stderr: '' };
          if (!pass && firstFail === -1) firstFail = j;
        }
        if (tle && firstFail === -1) firstFail = 0;
        if (firstFail !== -1 && results[firstFail]) results[firstFail].stderr = runtimeErr;
      }

      var passed = compileErr ? 0 : (firstFail === -1 ? cases.length : firstFail);
      lastResults = { cases: cases, results: results, isSubmit: isSubmit, compileErr: compileErr, firstFail: firstFail, passed: passed };

      if (isSubmit) {
        var f = results[firstFail] || {};
        var status = compileErr ? 'Compile Error'
          : (passed === cases.length ? 'Accepted'
          : (f.error ? 'Runtime Error'
          : (tle ? 'Time Limit Exceeded'
          : ((runtimeErr && (f.out === '' || f.out == null)) ? 'Runtime Error' : 'Wrong Answer'))));
        addSub({ ts: Date.now(), lang: lang, langName: META[lang].name, status: status, passed: passed, total: cases.length, code: code });
        if (status === 'Accepted') {
          markSolved(); paintSolved();
          if (typeof triggerCelebration === 'function') {
            triggerCelebration('Accepted \uD83C\uDF89', 'All ' + cases.length + ' test cases passed in ' + META[lang].name + '. On to the next one!');
          }
        }
      }
      renderResult();
      busy = false; runBtn.disabled = false; submitBtn.disabled = false; statusEl.textContent = '';
    }).catch(function () {
      consoleBody.innerHTML = '<div class="lc-verdict wa">Backend Unavailable <small>Could not reach the execution service.</small></div>';
      busy = false; runBtn.disabled = false; submitBtn.disabled = false; statusEl.textContent = '';
    });
  }

  // ---- console (bottom-right) rendering ----
  function syncConsoleTabs() { consoleTabs.forEach(function (t) { t.classList.toggle('active', t.getAttribute('data-tab') === curTab); }); if (curTab === 'cases') renderCases(); else renderResult(); }

  function caseInputStr(c) { return c.display ? Object.keys(c.display).map(function (k) { return k + ' = ' + c.display[k]; }).join('\n') : c.stdin; }

  // ---- LeetCode-style diagrams + input format hints for the sample cases ----
  function scParse(v) { try { return JSON.parse(v); } catch (e) { return null; } }
  function scBuildTree(arr) {
    if (!arr || !arr.length || arr[0] === null) return null;
    var root = { val: arr[0], left: null, right: null }, q = [root], i = 1;
    while (q.length && i < arr.length) {
      var n = q.shift();
      if (i < arr.length && arr[i] !== null) { n.left = { val: arr[i], left: null, right: null }; q.push(n.left); } i++;
      if (i < arr.length && arr[i] !== null) { n.right = { val: arr[i], left: null, right: null }; q.push(n.right); } i++;
    }
    return root;
  }
  function scTreeSVG(arr) {
    var root = scBuildTree(arr);
    if (!root) return '<div class="lc-dg-empty">empty tree</div>';
    var xc = 0, maxd = 0;
    (function assign(n, d) { if (!n) return; assign(n.left, d + 1); n.x = xc++; n.y = d; if (d > maxd) maxd = d; assign(n.right, d + 1); })(root, 0);
    var sx = 46, sy = 56, pad = 22, r = 15;
    var nodes = []; (function collect(n) { if (!n) return; nodes.push(n); collect(n.left); collect(n.right); })(root);
    function px(n) { return pad + r + n.x * sx; } function py(n) { return pad + r + n.y * sy; }
    var W = pad * 2 + r * 2 + (xc - 1) * sx, H = pad * 2 + r * 2 + maxd * sy, edges = '', circ = '';
    nodes.forEach(function (n) {
      if (n.left) edges += '<line class="lc-dg-edge" x1="' + px(n) + '" y1="' + py(n) + '" x2="' + px(n.left) + '" y2="' + py(n.left) + '"/>';
      if (n.right) edges += '<line class="lc-dg-edge" x1="' + px(n) + '" y1="' + py(n) + '" x2="' + px(n.right) + '" y2="' + py(n.right) + '"/>';
    });
    nodes.forEach(function (n) { circ += '<circle class="lc-dg-node" cx="' + px(n) + '" cy="' + py(n) + '" r="' + r + '"/><text class="lc-dg-text" x="' + px(n) + '" y="' + (py(n) + 4) + '" text-anchor="middle">' + n.val + '</text>'; });
    return '<svg class="lc-dg" width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '">' + edges + circ + '</svg>';
  }
  function scListSVG(arr) {
    if (!arr || !arr.length) return '<div class="lc-dg-empty">empty list</div>';
    var bw = 38, bh = 30, gap = 26, pad = 12, y = 12, x = pad, parts = '';
    arr.forEach(function (v, i) {
      parts += '<rect class="lc-dg-node" x="' + x + '" y="' + y + '" width="' + bw + '" height="' + bh + '" rx="5"/><text class="lc-dg-text" x="' + (x + bw / 2) + '" y="' + (y + bh / 2 + 4) + '" text-anchor="middle">' + v + '</text>';
      if (i < arr.length - 1) parts += '<line class="lc-dg-edge" x1="' + (x + bw) + '" y1="' + (y + bh / 2) + '" x2="' + (x + bw + gap) + '" y2="' + (y + bh / 2) + '" marker-end="url(#scarrow)"/>';
      x += bw + gap;
    });
    var W = x - gap + pad, H = bh + y * 2;
    return '<svg class="lc-dg" width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '"><defs><marker id="scarrow" markerWidth="8" markerHeight="8" refX="6.5" refY="3" orient="auto"><path class="lc-dg-arrow" d="M0,0 L7,3 L0,6"/></marker></defs>' + parts + '</svg>';
  }
  function scGridSVG(g) {
    if (!g || !g.length) return '';
    var rows = g.map(function (row) { return typeof row === 'string' ? row.split('') : row; });
    var R = rows.length, C = rows[0].length, cs = 30, pad = 6, parts = '';
    for (var i = 0; i < R; i++) for (var j = 0; j < C; j++) {
      var x = pad + j * cs, y = pad + i * cs;
      parts += '<rect class="lc-dg-cell" x="' + x + '" y="' + y + '" width="' + cs + '" height="' + cs + '"/><text class="lc-dg-text" x="' + (x + cs / 2) + '" y="' + (y + cs / 2 + 4) + '" text-anchor="middle">' + rows[i][j] + '</text>';
    }
    return '<svg class="lc-dg" width="' + (pad * 2 + C * cs) + '" height="' + (pad * 2 + R * cs) + '" viewBox="0 0 ' + (pad * 2 + C * cs) + ' ' + (pad * 2 + R * cs) + '">' + parts + '</svg>';
  }
  function scDiagram(type, disp) {
    if (!disp) return '';
    var svg = '';
    if (/^TREE/.test(type)) { var k = disp.root !== undefined ? 'root' : (disp.p !== undefined ? 'p' : null); if (k) svg = scTreeSVG(scParse(disp[k])); }
    else if (/^LIST/.test(type)) { var k2 = disp.head !== undefined ? 'head' : (disp.l1 !== undefined ? 'l1' : null); if (k2) svg = scListSVG(scParse(disp[k2])); }
    else if (/GRID/.test(type) && disp.grid !== undefined) { svg = scGridSVG(scParse(disp.grid)); }
    return svg ? '<div class="lc-diagram">' + svg + '</div>' : '';
  }
  function scFormatNote(type) {
    if (/^TREE/.test(type)) return 'Tree given in level-order (breadth-first); <code>null</code> marks a missing child.';
    if (/^LIST/.test(type)) return 'Linked list values from head to tail.';
    if (/^CHARGRID/.test(type)) return 'Character grid — one row per line.';
    if (/GRID/.test(type)) return '2D grid — one row per line.';
    return '';
  }

  function renderCases() {
    var cs = P.cases.slice(0, SAMPLE);
    var tabs = cs.map(function (c, i) {
      var res = lastResults && lastResults.results[i];
      var dot = res ? (res.pass ? ' pass' : ' fail') : '';
      return '<button class="lc-case-tab' + (i === activeCase ? ' active' : '') + '" data-i="' + i + '"><span class="lc-case-dot' + dot + '"></span>Case ' + (i + 1) + '</button>';
    }).join('');
    var c = cs[activeCase] || cs[0]; var body = '';
    if (c) {
      body += scDiagram(P.type, c.display);
      var note = scFormatNote(P.type);
      if (note) body += '<div class="lc-fmt-note">' + note + '</div>';
      body += '<div class="lc-io-label">Input</div><div class="lc-io-box">' + esc(caseInputStr(c)) + '</div>';
      body += '<div class="lc-io-label">Expected</div><div class="lc-io-box">' + esc(c.expected) + '</div>';
      var res = lastResults && lastResults.results[activeCase];
      if (res && !res.skipped) {
        var g = res.error ? '(backend unavailable)' : (res.timedOut ? '(time limit exceeded)' : (res.stderr ? res.out + '\n' + res.stderr : (res.out || '(no output)')));
        body += '<div class="lc-io-label">Your Output</div><div class="lc-io-box' + (res.pass ? '' : ' bad') + '">' + esc(g) + '</div>';
      }
    }
    consoleBody.innerHTML = '<div class="lc-case-tabs">' + tabs + '</div>' + body;
    consoleBody.querySelectorAll('.lc-case-tab').forEach(function (t) { t.addEventListener('click', function () { activeCase = parseInt(t.getAttribute('data-i'), 10); renderCases(); }); });
  }

  function renderResult() {
    if (!lastResults) { consoleBody.innerHTML = '<div class="lc-verdict run">Run your code to see results.</div>'; return; }
    var r = lastResults;
    if (r.compileErr) { consoleBody.innerHTML = '<div class="lc-verdict wa">Compilation Error</div><div class="lc-io-box bad">' + esc(r.compileErr) + '</div>'; return; }
    var all = r.passed === r.cases.length; var html;
    if (all) { html = '<div class="lc-verdict ac">Accepted <small>' + r.passed + ' / ' + r.cases.length + ' passed</small></div>'; }
    else {
      var f = r.results[r.firstFail] || {}, tc = r.cases[r.firstFail] || {};
      var label = f.error ? 'Backend Unavailable' : (f.timedOut ? 'Time Limit Exceeded' : (f.stderr ? 'Runtime Error' : 'Wrong Answer'));
      html = '<div class="lc-verdict wa">' + label + ' <small>' + r.passed + ' / ' + r.cases.length + ' passed · case ' + (r.firstFail + 1) + '</small></div>';
      if (f.error) { html += '<div class="lc-io-box bad">Could not reach the execution service.</div>'; }
      else {
        html += '<div class="lc-io-label">Input</div><div class="lc-io-box">' + esc(caseInputStr(tc)) + '</div>';
        html += '<div class="lc-io-label">Expected</div><div class="lc-io-box">' + esc(tc.expected) + '</div>';
        var g = f.timedOut ? '(time limit exceeded)' : (f.stderr ? (f.out + '\n' + f.stderr) : (f.out || '(no output)'));
        html += '<div class="lc-io-label">Your Output</div><div class="lc-io-box bad">' + esc(g) + '</div>';
      }
    }
    consoleBody.innerHTML = html;
  }

  // ---- left pane tabs ----
  function paintSolved() {
    if (!leftBody) return;
    var h1 = leftBody.querySelector('h1');
    if (!h1) return;
    var existing = h1.querySelector('.lc-solved-badge');
    if (isSolved()) {
      if (!existing) { var b = document.createElement('span'); b.className = 'lc-solved-badge'; b.innerHTML = '✓ Solved'; h1.appendChild(b); }
    } else if (existing) { existing.remove(); }
  }

  function timeAgo(ts) {
    var s = Math.floor((Date.now() - ts) / 1000);
    if (s < 60) return s + 's ago';
    if (s < 3600) return Math.floor(s / 60) + 'm ago';
    if (s < 86400) return Math.floor(s / 3600) + 'h ago';
    return new Date(ts).toLocaleDateString();
  }

  function showLeftTab(tab) {
    leftTabs.forEach(function (t) { t.classList.toggle('active', t.getAttribute('data-ltab') === tab); });
    if (tab === 'description') { leftBody.innerHTML = descHtml; paintSolved(); return; }
    if (tab === 'editorial') {
      leftBody.innerHTML = P.editorial ? '<div class="lc-editorial">' + P.editorial + '</div>' : '<div class="lc-empty">Editorial coming soon.</div>';
      return;
    }
    if (tab === 'submissions') {
      var a = subs();
      if (!a.length) { leftBody.innerHTML = '<div class="lc-empty">No submissions yet. Solve it and hit Submit.</div>'; return; }
      leftBody.innerHTML = a.map(function (s, i) {
        var cls = s.status === 'Accepted' ? 'ac' : 'wa';
        return '<div class="lc-sub-row" data-i="' + i + '"><span class="lc-sub-status ' + cls + '">' + esc(s.status) + '</span>' +
          '<span class="lc-sub-meta">' + esc(s.langName || s.lang) + ' · ' + s.passed + '/' + s.total + ' · ' + timeAgo(s.ts) + '</span></div>' +
          '<div class="lc-sub-code" id="lc-subcode-' + i + '" hidden>' + esc(s.code) + '</div>';
      }).join('');
      leftBody.querySelectorAll('.lc-sub-row').forEach(function (row) {
        row.addEventListener('click', function () { var c = document.getElementById('lc-subcode-' + row.getAttribute('data-i')); if (c) c.hidden = !c.hidden; });
      });
      return;
    }
    if (tab === 'discuss') {
      var posts = lsGet(DISCUSS_KEY, []);
      var form = '<div class="lc-discuss-form"><input id="lc-dname" placeholder="Name (optional)" maxlength="40"><textarea id="lc-dtext" placeholder="Share your approach, ask a question…"></textarea><button class="lc-discuss-post" id="lc-dpost" type="button">Post</button></div>';
      var list = posts.length ? posts.map(function (p) {
        return '<div class="lc-discuss-item"><span class="who">' + esc(p.name || 'Anonymous') + '</span><span class="when">' + timeAgo(p.ts) + '</span><div class="txt">' + esc(p.text) + '</div></div>';
      }).join('') : '<div class="lc-empty">No discussion yet. Start the conversation.</div>';
      leftBody.innerHTML = form + '<div style="margin-top:1rem">' + list + '</div>';
      var post = document.getElementById('lc-dpost');
      post.addEventListener('click', function () {
        var t = document.getElementById('lc-dtext').value.trim(); if (!t) return;
        var n = document.getElementById('lc-dname').value.trim();
        var arr = lsGet(DISCUSS_KEY, []); arr.unshift({ name: n, text: t, ts: Date.now() }); lsSet(DISCUSS_KEY, arr);
        showLeftTab('discuss');
      });
      return;
    }
  }

  // ---- boot ----
  function initEditor() {
    var lang = curLang();
    cm = CodeMirror(editorHost, { value: stubFor(lang), mode: META[lang].mode, theme: themeName(), lineNumbers: true, indentUnit: 4, tabSize: 4, autoCloseBrackets: true, matchBrackets: true });
    cm.setSize('100%', '100%');
    cm.on('change', function () { persistCode(curLang(), cm.getValue()); });
    new MutationObserver(function () { cm.setOption('theme', themeName()); }).observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
    cm.setOption('extraKeys', {
      'Cmd-Enter': function () { submitBtn.click(); }, 'Ctrl-Enter': function () { submitBtn.click(); },
      "Cmd-'": function () { runBtn.click(); }, "Ctrl-'": function () { runBtn.click(); },
    });
    runBtn.disabled = false; submitBtn.disabled = false;
  }

  function boot() {
    langSel = document.getElementById('lc-lang'); editorHost = document.getElementById('lc-editor');
    runBtn = document.getElementById('lc-run'); submitBtn = document.getElementById('lc-submit');
    resetBtn = document.getElementById('lc-reset'); statusEl = document.getElementById('lc-status');
    consoleBody = document.getElementById('lc-console-body');
    consoleTabs = Array.prototype.slice.call(document.querySelectorAll('.lc-console-tab'));
    leftBody = document.getElementById('lc-left-body');
    leftTabs = Array.prototype.slice.call(document.querySelectorAll('.lc-ltab'));
    if (!langSel || !editorHost || !leftBody) return;

    descHtml = leftBody.innerHTML;
    paintSolved();
    // Progress loads async once auth resolves; re-paint when it's ready or changes.
    document.addEventListener('sc-judge-ready', function () {
      paintSolved();
      var active = document.querySelector('.lc-ltab.active');
      if (active && active.getAttribute('data-ltab') === 'submissions') showLeftTab('submissions');
    });

    LANG_KEYS.forEach(function (k) { var o = document.createElement('option'); o.value = k; o.textContent = META[k].name; langSel.appendChild(o); });
    langSel.value = prefLang();
    // Persist language choice immediately (even before the editor finishes
    // loading) so the selection always sticks and defaults to it next time.
    langSel.addEventListener('change', function () {
      lsSet(LANG_KEY, curLang());
      if (cm) { cm.setOption('mode', META[curLang()].mode); cm.setValue(stubFor(curLang())); }
    });

    runBtn.title = "Run (Ctrl/Cmd + ')"; submitBtn.title = 'Submit (Ctrl/Cmd + Enter)';

    // Timer (counts up; click = pause/resume, double-click = reset)
    var timerEl = document.getElementById('lc-timer');
    if (timerEl) {
      var secs = 0, running = true;
      var fmtT = function (s) { var m = Math.floor(s / 60), ss = s % 60; return (m < 10 ? '0' : '') + m + ':' + (ss < 10 ? '0' : '') + ss; };
      timerEl.textContent = fmtT(0);
      setInterval(function () { if (running) { secs++; timerEl.textContent = fmtT(secs); } }, 1000);
      timerEl.addEventListener('click', function () { running = !running; timerEl.classList.toggle('paused', !running); });
      timerEl.addEventListener('dblclick', function () { secs = 0; timerEl.textContent = fmtT(0); running = true; timerEl.classList.remove('paused'); });
    }
    consoleTabs.forEach(function (t) { t.addEventListener('click', function () { curTab = t.getAttribute('data-tab'); syncConsoleTabs(); }); });
    leftTabs.forEach(function (t) { t.addEventListener('click', function () { showLeftTab(t.getAttribute('data-ltab')); }); });
    renderCases();

    loadCM().then(function () {
      initEditor();
      resetBtn.addEventListener('click', function () { cm.setValue(P.langs[curLang()].stub || ''); persistCode(curLang(), cm.getValue()); });
      runBtn.addEventListener('click', function () { activeCase = 0; runCases(P.cases.slice(0, SAMPLE), false); });
      submitBtn.addEventListener('click', function () { runCases(P.cases, true); });
      document.addEventListener('keydown', function (e) {
        if (!(e.metaKey || e.ctrlKey)) return;
        if (e.key === 'Enter') { e.preventDefault(); submitBtn.click(); }
        else if (e.key === "'") { e.preventDefault(); runBtn.click(); }
      });
    }).catch(function () { statusEl.textContent = 'Editor failed to load'; });

    var divider = document.getElementById('lc-divider'), left = document.querySelector('.lc-left'), shell = document.querySelector('.lc-shell');
    if (divider && left) {
      var dragging = false;
      divider.addEventListener('mousedown', function () { dragging = true; document.body.style.userSelect = 'none'; });
      window.addEventListener('mouseup', function () { dragging = false; document.body.style.userSelect = ''; if (cm) cm.refresh(); });
      window.addEventListener('mousemove', function (e) { if (!dragging) return; var rect = shell.getBoundingClientRect(); var pct = ((e.clientX - rect.left) / rect.width) * 100; if (pct > 22 && pct < 68) left.style.width = pct + '%'; });
    }
  }

  if (document.readyState !== 'loading') boot();
  else document.addEventListener('DOMContentLoaded', boot);
})();
</script>
