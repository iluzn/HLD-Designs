<div class="notif-wrap" id="notif-wrap" style="display:none;"><button class="notif-btn" id="notif-btn" title="Notifications" aria-label="Notifications"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="notif-badge" id="notif-badge" style="display:none;">0</span></button><div class="notif-dropdown" id="notif-dropdown"><div class="notif-head"><span>Notifications</span><button id="notif-markall" class="notif-markall">Mark all read</button></div><div class="notif-list" id="notif-list"></div></div></div><button class="auth-btn" id="auth-btn" title="Sign in to sync progress"><svg class="auth-google-icon" viewBox="0 0 18 18" fill="none"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.997 8.997 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>Sign in</button><div class="auth-dropdown" id="auth-dropdown"><div class="auth-dropdown-header"><div class="auth-dropdown-name" id="auth-name"></div><div class="auth-dropdown-email" id="auth-email"></div></div><button class="auth-dropdown-btn" id="auth-signout">Sign out</button></div>
<script>
/* Optimistically paint the signed-in avatar from cache to avoid the
   "Sign in" -> avatar flicker while Firebase restores the session async. */
(function () {
    try {
        var c = JSON.parse(localStorage.getItem('authCache') || 'null');
        if (c && c.photoURL) {
            var btn = document.getElementById('auth-btn');
            if (btn) {
                var img = document.createElement('img');
                img.className = 'auth-avatar';
                img.src = c.photoURL;
                img.alt = c.displayName || '';
                btn.innerHTML = '';
                btn.appendChild(img);
                btn.classList.add('signed-in');
                btn.title = c.displayName || '';
            }
        }
    } catch (e) {}
})();
</script>
