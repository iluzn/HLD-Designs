<!-- Syncs the salary-tracker Status/Comment to Firestore under
     users/{uid}.compTrack.{level}, so it follows the signed-in account across
     devices. Falls back to localStorage when signed out. Exposes
     window._scCompTrack, window.scCompSave(level, data), event 'sc-comp-ready'. -->
<script type="module">
import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBRZYsCxcjkug4EVGmMuhAgKM4moRH_ewA",
  authDomain: "systemcraft-in.firebaseapp.com",
  projectId: "systemcraft-in",
  storageBucket: "systemcraft-in.firebasestorage.app",
  messagingSenderId: "57513541148",
  appId: "1:57513541148:web:f929b383e79a7bf97869d9"
};
const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window._scCompTrack = null;   // Firestore-loaded map { s1:{...}, s2:{...}, s3:{...} }
window._scCompUser = null;

// One-time cleanup: the old build mirrored everyone's data to a shared key
// (sc-comptrack-<level>), which leaked a signed-in user's data to the next
// signed-out viewer on the same browser. Remove it.
try { ['s1', 's2', 's3'].forEach(function (l) { localStorage.removeItem('sc-comptrack-' + l); }); } catch (e) {}

const LEVELS = ['s1', 's2', 's3'];

// Each level's tracker lives in its own subcollection doc
// (users/{uid}/compTrack/{level}), so it scales independently of the judge
// summary doc and never competes for the 1 MiB budget. Legacy data stored
// inline at users/{uid}.compTrack is migrated to the subcollection on load.
onAuthStateChanged(auth, async function (user) {
  if (user) {
    window._scCompUser = user.uid;
    try {
      const snaps = await Promise.all(LEVELS.map(function (lv) { return getDoc(doc(db, 'users', user.uid, 'compTrack', lv)); }));
      const track = {};
      let missing = false;
      LEVELS.forEach(function (lv, i) { if (snaps[i].exists()) track[lv] = snaps[i].data(); else missing = true; });
      // Fill any missing level from legacy inline data and migrate it.
      if (missing) {
        try {
          const main = (window.__scUDocUid === user.uid && window.__scUDoc) ? await window.__scUDoc : await getDoc(doc(db, 'users', user.uid));
          const legacy = (main.exists() && main.data().compTrack) ? main.data().compTrack : null;
          if (legacy) {
            LEVELS.forEach(function (lv) {
              if (!track[lv] && legacy[lv]) { track[lv] = legacy[lv]; setDoc(doc(db, 'users', user.uid, 'compTrack', lv), legacy[lv]).catch(function () {}); }
            });
          }
        } catch (e) { /* legacy read best-effort */ }
      }
      window._scCompTrack = track;
    } catch (e) { window._scCompTrack = window._scCompTrack || {}; }
  } else {
    window._scCompUser = null;
    window._scCompTrack = null;   // signed out → widget uses the anon bucket only
  }
  document.dispatchEvent(new CustomEvent('sc-comp-ready'));
});

// Persist a level's tracker map. Storage is scoped so a signed-in user's data
// is never shown to a later signed-out viewer:
//   signed in  -> Firestore + cache key 'sc-comptrack-<uid>-<level>'
//   signed out -> 'sc-comptrack-anon-<level>' only
window.scCompSave = async function (level, data) {
  var uid = window._scCompUser;
  // Cap free-text comments so the tracker can't balloon the shared user doc
  // (it lives in the same 1 MiB document as judge progress).
  try { Object.keys(data || {}).forEach(function (k) { if (data[k] && typeof data[k].comment === 'string' && data[k].comment.length > 280) data[k].comment = data[k].comment.slice(0, 280); }); } catch (e) {}
  try {
    if (uid) localStorage.setItem('sc-comptrack-' + uid + '-' + level, JSON.stringify(data));
    else localStorage.setItem('sc-comptrack-anon-' + level, JSON.stringify(data));
  } catch (e) {}
  if (uid) {
    try {
      await setDoc(doc(db, 'users', uid, 'compTrack', level), data);
    } catch (e) { console.error('comp track save failed', e); }
  }
};
</script>
