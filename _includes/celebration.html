<!-- Reusable full-page celebration (confetti + modal). Call triggerCelebration(title, subtitle). -->
<script>
function triggerCelebration(title, subtitle) {
    if (document.getElementById('celebration-overlay')) return;
    var overlay = document.createElement('div');
    overlay.id = 'celebration-overlay';
    overlay.innerHTML = '<div class="celeb-backdrop"></div><div class="celeb-confetti-container" id="celeb-confetti"></div><div class="celeb-modal"><div class="celeb-badge"><svg width="48" height="48" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="24" fill="url(#grad1)"/><path d="M16 24l6 6 10-12" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><defs><linearGradient id="grad1" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#818cf8"/><stop offset="1" stop-color="#a78bfa"/></linearGradient></defs></svg></div><h2>' + title + '</h2><p>' + subtitle + '</p><button class="celeb-btn" onclick="closeCelebration()">Continue</button></div>';
    document.body.appendChild(overlay);

    var container = document.getElementById('celeb-confetti');
    var confettiColors = ['#818cf8', '#a78bfa', '#f472b6', '#facc15', '#34d399', '#60a5fa', '#fb923c', '#e879f9', '#fff'];
    for (var i = 0; i < 80; i++) {
        var piece = document.createElement('div');
        piece.className = 'celeb-piece';
        var isLeft = i % 2 === 0;
        piece.style.left = isLeft ? '-2%' : '102%';
        piece.style.top = (30 + Math.random() * 40) + '%';
        piece.style.backgroundColor = confettiColors[Math.floor(Math.random() * confettiColors.length)];
        piece.style.width = (Math.random() * 8 + 4) + 'px';
        piece.style.height = (Math.random() * 12 + 6) + 'px';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        piece.style.setProperty('--x-end', (isLeft ? 1 : -1) * (Math.random() * 60 + 20) + 'vw');
        piece.style.setProperty('--y-end', (Math.random() * -40 - 10) + 'vh');
        piece.style.setProperty('--r-end', (Math.random() * 720 - 360) + 'deg');
        piece.style.animationDelay = (Math.random() * 0.4) + 's';
        piece.style.animationDuration = (Math.random() * 1.5 + 1.5) + 's';
        container.appendChild(piece);
    }
    setTimeout(closeCelebration, 6000);
}
function closeCelebration() {
    var overlay = document.getElementById('celebration-overlay');
    if (!overlay) return;
    overlay.classList.add('celeb-closing');
    setTimeout(function() { overlay.remove(); }, 400);
}
</script>
<style>
#celebration-overlay { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; }
#celebration-overlay.celeb-closing { animation: celeb-fadeout 0.4s ease forwards; }
@keyframes celeb-fadeout { to { opacity: 0; } }
.celeb-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(6px); animation: celeb-fadein 0.3s ease; }
[data-theme="light"] .celeb-backdrop { background: rgba(255,255,255,0.6); }
@keyframes celeb-fadein { from { opacity: 0; } to { opacity: 1; } }
.celeb-confetti-container { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
.celeb-piece { position: absolute; opacity: 0; animation: celeb-burst ease-out forwards; }
@keyframes celeb-burst { 0% { opacity: 1; transform: translate(0, 0) rotate(0deg) scale(1); } 70% { opacity: 1; } 100% { opacity: 0; transform: translate(var(--x-end), var(--y-end)) rotate(var(--r-end)) scale(0.3); } }
.celeb-modal { position: relative; background: var(--bg-card, rgba(25,25,35,0.95)); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem 3rem; text-align: center; max-width: 360px; width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 0 1px rgba(129,140,248,0.1); animation: celeb-modal-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s both; }
[data-theme="light"] .celeb-modal { background: rgba(255,255,255,0.95); box-shadow: 0 20px 60px rgba(0,0,0,0.1), 0 0 0 1px rgba(99,102,241,0.1); }
@keyframes celeb-modal-in { from { opacity: 0; transform: scale(0.8) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.celeb-badge { width: 64px; height: 64px; margin: 0 auto 1.2rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(129,140,248,0.1); border: 2px solid rgba(129,140,248,0.2); animation: celeb-badge-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s both; }
@keyframes celeb-badge-pop { from { transform: scale(0); } to { transform: scale(1); } }
.celeb-modal h2 { color: var(--text); font-size: 1.2rem; font-weight: 700; margin-bottom: 0.4rem; animation: celeb-text-in 0.4s ease 0.5s both; }
.celeb-modal p { color: var(--text-muted); font-size: 0.85rem; line-height: 1.5; margin-bottom: 1.5rem; animation: celeb-text-in 0.4s ease 0.6s both; }
@keyframes celeb-text-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.celeb-btn { background: var(--accent, #818cf8); color: #fff; border: none; padding: 0.65rem 2rem; border-radius: 10px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 4px 12px rgba(129,140,248,0.3); animation: celeb-text-in 0.4s ease 0.7s both; }
.celeb-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(129,140,248,0.4); }
.celeb-btn:active { transform: translateY(0); }
</style>
