{%- comment -%}
Online judge widget. A problem page must define window.SC_PROBLEM before
including this file, e.g.:

<script>
window.SC_PROBLEM = {
  id: "two-sum",
  timeLimitMs: 5000,
  starter: { python: "...", java: "...", cpp: "..." },
  samples: [{ input: "4\n2 7 11 15\n9", output: "0 1" }],
  tests:   [{ input: "...", output: "..." }]   // includes hidden cases
};
</script>
{%- endcomment -%}
<style>
.sc-judge { --j-radius: 12px; border: 1px solid var(--border, rgba(255,255,255,0.1)); border-radius: var(--j-radius); background: var(--card-bg, rgba(25,25,35,0.7)); margin: 1.5rem 0; overflow: hidden; }
.sc-judge-bar { display: flex; align-items: center; gap: 0.6rem; padding: 0.55rem 0.8rem; background: rgba(0,0,0,0.18); border-bottom: 1px solid var(--border, rgba(255,255,255,0.1)); flex-wrap: wrap; }
[data-theme="light"] .sc-judge-bar { background: rgba(0,0,0,0.03); }
.sc-judge-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim, #6b7280); margin-right: auto; }
.sc-judge select { font-family: inherit; font-size: 0.78rem; font-weight: 600; color: var(--text, #e8edf3); background: var(--tag-bg, rgba(129,140,248,0.08)); border: 1px solid var(--border, rgba(255,255,255,0.12)); border-radius: 8px; padding: 0.35rem 0.55rem; cursor: pointer; outline: none; }
.sc-judge .sc-btn { font-family: inherit; font-size: 0.78rem; font-weight: 700; border-radius: 8px; padding: 0.4rem 0.95rem; cursor: pointer; border: 1px solid transparent; transition: transform 0.15s, opacity 0.15s; }
.sc-judge .sc-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.sc-run { color: var(--text, #e8edf3); background: var(--tag-bg, rgba(129,140,248,0.1)); border-color: var(--border, rgba(129,140,248,0.3)); }
.sc-run:hover:not(:disabled) { transform: translateY(-1px); }
.sc-submit { color: #fff; background: linear-gradient(135deg, #22c55e, #16a34a); }
.sc-submit:hover:not(:disabled) { transform: translateY(-1px); }
.sc-reset2 { color: var(--text-muted, #9ba3b0); background: transparent; border-color: var(--border, rgba(255,255,255,0.12)); }
.sc-judge .CodeMirror { height: auto; min-height: 260px; font-family: 'JetBrains Mono', monospace; font-size: 0.83rem; }
.sc-judge .CodeMirror-scroll { min-height: 260px; }
.sc-verdict { padding: 0; border-top: 1px solid var(--border, rgba(255,255,255,0.1)); }
.sc-verdict-head { display: flex; align-items: center; gap: 0.6rem; padding: 0.7rem 0.9rem; font-size: 0.85rem; font-weight: 700; }
.sc-verdict-head .sc-tag { font-size: 0.7rem; font-weight: 700; padding: 3px 9px; border-radius: 6px; }
.sc-ac { color: #22c55e; } .sc-ac .sc-tag { background: rgba(34,197,94,0.14); color: #22c55e; }
.sc-wa { color: #f87171; } .sc-wa .sc-tag { background: rgba(248,113,113,0.14); color: #f87171; }
.sc-info { color: var(--text-muted, #9ba3b0); }
.sc-cases { padding: 0 0.9rem 0.9rem; display: flex; flex-direction: column; gap: 0.5rem; }
.sc-case { border: 1px solid var(--border, rgba(255,255,255,0.08)); border-radius: 8px; overflow: hidden; }
.sc-case-head { display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem 0.7rem; font-size: 0.75rem; font-weight: 600; background: rgba(0,0,0,0.12); cursor: pointer; }
[data-theme="light"] .sc-case-head { background: rgba(0,0,0,0.03); }
.sc-case-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.sc-case-dot.pass { background: #22c55e; } .sc-case-dot.fail { background: #f87171; } .sc-case-dot.pending { background: #6b7280; }
.sc-case-body { display: none; grid-template-columns: 1fr 1fr 1fr; gap: 0; border-top: 1px solid var(--border, rgba(255,255,255,0.08)); }
.sc-case.open .sc-case-body { display: grid; }
@media (max-width: 640px) { .sc-case-body { grid-template-columns: 1fr; } }
.sc-case-col { padding: 0.5rem 0.7rem; min-width: 0; }
.sc-case-col + .sc-case-col { border-left: 1px solid var(--border, rgba(255,255,255,0.08)); }
@media (max-width: 640px) { .sc-case-col + .sc-case-col { border-left: none; border-top: 1px solid var(--border, rgba(255,255,255,0.08)); } }
.sc-case-label { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim, #6b7280); margin-bottom: 0.25rem; }
.sc-case-pre { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; white-space: pre-wrap; word-break: break-word; color: var(--text-muted, #9ba3b0); margin: 0; max-height: 140px; overflow: auto; }
.sc-case-pre.mismatch { color: #f87171; }
.sc-judge-note { font-size: 0.7rem; color: var(--text-dim, #6b7280); padding: 0 0.9rem 0.8rem; }
</style>

<div class="sc-judge" id="sc-judge">
  <div class="sc-judge-bar">
    <span class="sc-judge-title">▶ Code &amp; Judge</span>
    <span class="sc-judge-status sc-info" style="font-size:0.72rem;"></span>
    <select class="sc-judge-lang" aria-label="Language"><option>Loading…</option></select>
    <button class="sc-btn sc-reset2" type="button">Reset</button>
    <button class="sc-btn sc-run" type="button" disabled>Run samples</button>
    <button class="sc-btn sc-submit" type="button" disabled>Submit</button>
  </div>
  <div class="sc-judge-editor"></div>
  <div class="sc-verdict" hidden>
    <div class="sc-verdict-head sc-info"><span class="sc-verdict-text">—</span></div>
    <div class="sc-cases"></div>
  </div>
  <div class="sc-judge-note">Your code runs against test cases in a sandbox. Solutions persist in this browser. Read input from <b>stdin</b>, print the answer to <b>stdout</b>.</div>
</div>

<script>
(function () {
  var P = window.SC_PROBLEM;
  if (!P) return;

  var ENDPOINT = (window.SC_RUNNER_ENDPOINT) ? window.SC_RUNNER_ENDPOINT : 'https://systemcraft-og.shaswat-kumar03.workers.dev';
  var CM_BASE = 'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16';
  var STORAGE = 'sc-judge-' + P.id;

  // Language config: display name, Piston ids, CodeMirror mode, filename.
  var LANGS = [
    { key: 'python', name: 'Python', ids: ['python', 'python3'], mode: 'python', file: 'main.py' },
    { key: 'java',   name: 'Java',   ids: ['java'],              mode: 'text/x-java', file: 'Main.java' },
    { key: 'cpp',    name: 'C++',    ids: ['c++', 'cpp'],        mode: 'text/x-c++src', file: 'main.cpp' }
  ].filter(function (L) { return P.starter && P.starter[L.key]; });

  // Bound at boot() time (on DOMContentLoaded), NOT here. Other layout
  // scripts rewrite `.content` innerHTML after this script runs, which
  // replaces these DOM nodes — so we must query them after that happens.
  var root, langSel, runBtn, submitBtn, resetBtn, statusEl, editorHost,
      verdictWrap, verdictHead, verdictText, casesEl;

  function bindDom() {
    root = document.getElementById('sc-judge');
    if (!root) return false;
    langSel = root.querySelector('.sc-judge-lang');
    runBtn = root.querySelector('.sc-run');
    submitBtn = root.querySelector('.sc-submit');
    resetBtn = root.querySelector('.sc-reset2');
    statusEl = root.querySelector('.sc-judge-status');
    editorHost = root.querySelector('.sc-judge-editor');
    verdictWrap = root.querySelector('.sc-verdict');
    verdictHead = root.querySelector('.sc-verdict-head');
    verdictText = root.querySelector('.sc-verdict-text');
    casesEl = root.querySelector('.sc-cases');
    return true;
  }

  function loadCss(href) {
    return new Promise(function (res) {
      if (document.querySelector('link[href="' + href + '"]')) return res();
      var l = document.createElement('link'); l.rel = 'stylesheet'; l.href = href;
      l.onload = res; l.onerror = res; document.head.appendChild(l);
    });
  }
  function loadJs(src) {
    return new Promise(function (res, rej) {
      if (document.querySelector('script[src="' + src + '"]')) return res();
      var s = document.createElement('script'); s.src = src; s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }
  function loadCodeMirror() {
    return Promise.all([
      loadCss(CM_BASE + '/codemirror.min.css'),
      loadCss(CM_BASE + '/theme/material-darker.min.css'),
      loadCss(CM_BASE + '/theme/eclipse.min.css')
    ]).then(function () { return loadJs(CM_BASE + '/codemirror.min.js'); })
      .then(function () {
        return Promise.all([
          loadJs(CM_BASE + '/mode/clike/clike.min.js'),
          loadJs(CM_BASE + '/mode/python/python.min.js'),
          loadJs(CM_BASE + '/addon/edit/closebrackets.min.js'),
          loadJs(CM_BASE + '/addon/edit/matchbrackets.min.js')
        ]);
      });
  }
  // Refine Piston language versions in the background. The dropdown does NOT
  // wait on this — languages are known up front and default to version "*".
  function refineRuntimes() {
    fetch(ENDPOINT + '/runtimes').then(function (r) { return r.json(); })
      .then(function (rt) {
        if (!Array.isArray(rt)) return;
        available.forEach(function (L) {
          for (var i = 0; i < rt.length; i++) {
            var names = [rt[i].language].concat(rt[i].aliases || []);
            for (var k = 0; k < L.ids.length; k++)
              if (names.indexOf(L.ids[k]) !== -1) { L.pistonLang = rt[i].language; L.version = rt[i].version; return; }
          }
        });
      }).catch(function () {});
  }
  function themeName() {
    return document.documentElement.getAttribute('data-theme') === 'light' ? 'eclipse' : 'material-darker';
  }
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c];
    });
  }
  // Normalize output for comparison: trim trailing spaces per line, drop
  // trailing blank lines, and trim the whole thing.
  function normalize(s) {
    return String(s == null ? '' : s)
      .replace(/\r\n/g, '\n')
      .split('\n').map(function (line) { return line.replace(/\s+$/, ''); })
      .join('\n').replace(/\n+$/, '').trim();
  }

  var cm, available = [];

  function saved() {
    try { return JSON.parse(localStorage.getItem(STORAGE) || '{}'); } catch (e) { return {}; }
  }
  function persist(langKey, code) {
    var s = saved(); s[langKey] = code;
    try { localStorage.setItem(STORAGE, JSON.stringify(s)); } catch (e) {}
  }
  function currentLang() { return available[parseInt(langSel.value, 10)]; }
  function starterFor(L) {
    var s = saved();
    return (s[L.key] != null) ? s[L.key] : (P.starter[L.key] || '');
  }

  function boot() {
    if (!bindDom()) return;
    // Languages are known up front, so populate immediately (no network gate).
    available = LANGS.map(function (L) {
      return Object.assign({}, L, { pistonLang: L.ids[0], version: '*' });
    });
    if (!available.length) { langSel.innerHTML = '<option>None</option>'; return; }
    langSel.innerHTML = '';
    available.forEach(function (L, i) {
      var o = document.createElement('option'); o.value = String(i); o.textContent = L.name;
      langSel.appendChild(o);
    });
    statusEl.textContent = 'Loading editor…';
    loadCodeMirror().then(function () {
      initEditor();
      statusEl.textContent = '';
      refineRuntimes();
    }).catch(function () {
      statusEl.textContent = 'Editor failed to load';
    });
  }

  function initEditor() {
    cm = CodeMirror(editorHost, {
      value: starterFor(available[0]),
      mode: available[0].mode,
      theme: themeName(),
      lineNumbers: true, indentUnit: 4, tabSize: 4,
      autoCloseBrackets: true, matchBrackets: true, viewportMargin: Infinity
    });
    cm.on('change', function () { persist(currentLang().key, cm.getValue()); });
    new MutationObserver(function () { cm.setOption('theme', themeName()); })
      .observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

    langSel.addEventListener('change', function () {
      var L = currentLang();
      cm.setOption('mode', L.mode);
      cm.setValue(starterFor(L));
    });
    resetBtn.addEventListener('click', function () {
      var L = currentLang();
      cm.setValue(P.starter[L.key] || '');
      persist(L.key, cm.getValue());
      verdictWrap.hidden = true;
    });
    runBtn.addEventListener('click', function () { judge(P.samples || [], false); });
    submitBtn.addEventListener('click', function () { judge(P.tests || P.samples || [], true); });
    cm.setOption('extraKeys', { 'Cmd-Enter': function () { runBtn.click(); }, 'Ctrl-Enter': function () { runBtn.click(); } });

    runBtn.disabled = false; submitBtn.disabled = false;
  }

  function execute(L, stdin) {
    return fetch(ENDPOINT + '/execute', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        language: L.pistonLang, version: L.version,
        files: [{ name: L.file, content: cm.getValue() }],
        stdin: stdin || '', run_timeout: P.timeLimitMs || 5000
      })
    }).then(function (res) {
      if (res.status === 429) { return new Promise(function (r) { setTimeout(r, 1200); }).then(function () { return execute(L, stdin); }); }
      return res.json();
    });
  }

  var busy = false;
  function judge(cases, isSubmit) {
    if (busy || !cm) return;
    if (!cases.length) { statusEl.textContent = 'No test cases'; return; }
    busy = true; runBtn.disabled = true; submitBtn.disabled = true;
    statusEl.textContent = isSubmit ? 'Judging…' : 'Running…';
    verdictWrap.hidden = false;
    verdictHead.className = 'sc-verdict-head sc-info';
    verdictText.textContent = 'Running ' + cases.length + ' case' + (cases.length > 1 ? 's' : '') + '…';
    casesEl.innerHTML = '';

    var L = currentLang();
    var results = new Array(cases.length);
    var firstFail = -1, compileErr = null;

    var chain = Promise.resolve();
    cases.forEach(function (tc, idx) {
      chain = chain.then(function () {
        if (compileErr) { results[idx] = { skipped: true }; return; }
        return execute(L, tc.input).then(function (data) {
          if (data.compile && data.compile.code !== 0 && data.compile.stderr) {
            compileErr = data.compile.stderr;
            results[idx] = { compileErr: compileErr };
            return;
          }
          var run = data.run || {};
          var out = run.stdout || '';
          var ok = normalize(out) === normalize(tc.output);
          var timedOut = (run.signal === 'SIGKILL');
          results[idx] = {
            pass: ok && !run.stderr, out: out, stderr: run.stderr || '',
            expected: tc.output, input: tc.input, timedOut: timedOut, code: run.code
          };
          if (!results[idx].pass && firstFail === -1) firstFail = idx;
        }).catch(function () {
          results[idx] = { error: true };
          if (firstFail === -1) firstFail = idx;
        });
      });
    });

    chain.then(function () {
      render(cases, results, isSubmit, compileErr, firstFail);
      busy = false; runBtn.disabled = false; submitBtn.disabled = false;
      statusEl.textContent = '';
    });
  }

  function render(cases, results, isSubmit, compileErr, firstFail) {
    if (compileErr) {
      verdictHead.className = 'sc-verdict-head sc-wa';
      verdictText.innerHTML = '<span class="sc-tag">Compilation Error</span>';
      casesEl.innerHTML = '<pre class="sc-case-pre mismatch" style="max-height:200px">' + esc(compileErr) + '</pre>';
      return;
    }
    var passed = results.filter(function (r) { return r && r.pass; }).length;
    var allPass = passed === cases.length;
    verdictHead.className = 'sc-verdict-head ' + (allPass ? 'sc-ac' : 'sc-wa');

    if (allPass) {
      verdictText.innerHTML = '<span class="sc-tag">Accepted</span> ' +
        passed + ' / ' + cases.length + ' cases passed' + (isSubmit ? ' 🎉' : '');
    } else {
      var f = results[firstFail] || {};
      if (f.error) {
        verdictText.innerHTML = '<span class="sc-tag">Backend Unavailable</span> ' +
          'Could not reach the execution service. The judge needs a running Piston backend.';
        return;
      }
      var label = f.timedOut ? 'Time Limit Exceeded'
        : (f.stderr ? 'Runtime Error' : 'Wrong Answer');
      verdictText.innerHTML = '<span class="sc-tag">' + label + '</span> ' +
        passed + ' / ' + cases.length + ' passed · failed on case ' + (firstFail + 1);
    }

    casesEl.innerHTML = '';
    cases.forEach(function (tc, idx) {
      var r = results[idx] || {};
      var hidden = isSubmit && idx >= (P.samples ? P.samples.length : 0);
      var dot = r.pass ? 'pass' : (r.skipped ? 'pending' : 'fail');
      var div = document.createElement('div');
      div.className = 'sc-case' + (!r.pass && !r.skipped ? ' open' : '');
      var head = '<div class="sc-case-head"><span class="sc-case-dot ' + dot + '"></span>Case ' + (idx + 1) +
        (hidden ? ' (hidden)' : '') + ' — ' + (r.pass ? 'Passed' : (r.skipped ? 'Skipped' : 'Failed')) + '</div>';
      var body = '';
      if (!r.skipped) {
        var showIO = !hidden || !r.pass ? false : false; // hidden cases: never reveal input/expected
        var inputCell = hidden ? '<span class="sc-case-pre">hidden</span>' : '<pre class="sc-case-pre">' + esc(tc.input) + '</pre>';
        var expCell = hidden ? '<span class="sc-case-pre">hidden</span>' : '<pre class="sc-case-pre">' + esc(tc.output) + '</pre>';
        var gotCell = '<pre class="sc-case-pre' + (r.pass ? '' : ' mismatch') + '">' + esc(r.stderr ? (r.out + '\n' + r.stderr) : (r.out || '(no output)')) + '</pre>';
        body = '<div class="sc-case-body">' +
          '<div class="sc-case-col"><div class="sc-case-label">Input</div>' + inputCell + '</div>' +
          '<div class="sc-case-col"><div class="sc-case-label">Expected</div>' + expCell + '</div>' +
          '<div class="sc-case-col"><div class="sc-case-label">Your Output</div>' + gotCell + '</div>' +
          '</div>';
      }
      div.innerHTML = head + body;
      div.querySelector('.sc-case-head').addEventListener('click', function () { div.classList.toggle('open'); });
      casesEl.appendChild(div);
    });
  }

  if (document.readyState !== 'loading') boot();
  else document.addEventListener('DOMContentLoaded', boot);
})();
</script>
