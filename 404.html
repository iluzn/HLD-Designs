<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - SystemCraft</title>

    <style>
        :root {
            --bg: #111118; --text: #e8edf3; --text-muted: #9ba3b0; --text-dim: #6b7280;
            --accent: #818cf8; --accent-light: #c4b5fd;
            --border: rgba(255,255,255,0.09); --bg-card: rgba(25,25,35,0.6);
        }
        [data-theme="light"] {
            --bg: #f9fafb; --text: #0f172a; --text-muted: #374151; --text-dim: #6b7280;
            --accent: #4f46e5; --accent-light: #4338ca;
            --border: rgba(0,0,0,0.1); --bg-card: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
        .container { text-align: center; max-width: 520px; }
        .code { font-size: 6rem; font-weight: 800; line-height: 1; background: linear-gradient(135deg, var(--accent), var(--accent-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
        p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 2rem; }
        .links { display: flex; flex-wrap: wrap; gap: 0.6rem; justify-content: center; }
        .links a { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.55rem 1.1rem; font-size: 0.85rem; font-weight: 500; color: var(--text); text-decoration: none; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-card); transition: all 0.2s; }
        .links a:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
        .links a.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .links a.primary:hover { opacity: 0.9; }
        .path { margin-top: 2.5rem; font-size: 0.75rem; color: var(--text-dim); word-break: break-all; }
        .path code { background: var(--bg-card); border: 1px solid var(--border); padding: 0.2rem 0.5rem; border-radius: 4px; }
    </style>
</head>
